                    { question: "Le séquençage de l'exome entier (WES) est utilisé en neurogénétique principalement pour :", options: ["Mesurer l'activité cérébrale", "Identifier des variants rares causaux dans les maladies mendéliennes", "Visualiser les connexions neuronales", "Mesurer l'épaisseur corticale"], correct: 1, explanation: "Le séquençage de l'exome entier (WES) permet d'identifier des variants pathogènes rares dans les régions codantes du génome, particulièrement utile pour diagnostiquer des maladies neurologiques rares ou des encéphalopathies développementales.", ref: "Ng SB et al. (2010). Exome sequencing identifies the cause of a mendelian disorder. Nat Genet." },
                    { question: "La neurofibromatose de type 1 (NF1) est causée par des mutations de quel gène suppresseur de tumeur ?", options: ["TP53", "NF1 (neurofibromine)", "BRCA1", "RB1"], correct: 1, explanation: "La NF1 est causée par des mutations perte-de-fonction du gène NF1 codant la neurofibromine, un régulateur négatif de RAS. Elle est autosomique dominante et se manifeste par des neurofibromes, taches café-au-lait et difficultés d'apprentissage.", ref: "Viskochil D et al. (1990). Deletions and a translocation interrupt a cloned gene at the neurofibromatosis type 1 locus. Cell." },
                    { question: "Quelle est la prévalence de l'allèle APOE ε4 dans la population générale caucasienne ?", options: ["Moins de 1%", "Environ 15-20%", "Plus de 50%", "Exactement 5%"], correct: 1, explanation: "L'allèle APOE ε4 est présent chez environ 15-20% de la population générale caucasienne, mais chez 40-50% des patients atteints de maladie d'Alzheimer, illustrant son rôle de facteur de risque majeur sans être déterministe.", ref: "Farrer LA et al. (1997). Effects of age, sex, and ethnicity on the association between apolipoprotein E genotype and Alzheimer disease. JAMA." },
                    { question: "Le gène C9orf72 est impliqué dans quelle(s) maladie(s) neurodégénérative(s) ?", options: ["Maladie d'Alzheimer uniquement", "SLA et démence fronto-temporale (DFT)", "Maladie de Parkinson et ataxie de Friedreich", "Huntington et SLA"], correct: 1, explanation: "Une expansion GGGGCC dans C9orf72 est la mutation la plus fréquente dans les formes familiales de SLA (~40%) et de DFT (~25%). Elle est aussi retrouvée dans des cas sporadiques, illustrant le continuum SLA-DFT.", ref: "DeJesus-Hernandez M et al. (2011). Expanded GGGGCC hexanucleotide repeat in noncoding region of C9ORF72 causes chromosome 9p-linked FTD and ALS. Neuron." },
                    { question: "La génomique d'association pangénomique (GWAS) a permis en neurosciences de :", options: ["Séquencer l'intégralité du génome d'un individu", "Identifier des milliers de variants communs associés à des traits neurologiques et psychiatriques complexes", "Corriger des mutations pathogènes in vivo", "Mesurer l'expression des ARNm neuronaux"], correct: 1, explanation: "Les études GWAS ont identifié des centaines de loci de susceptibilité pour des maladies comme la schizophrénie, le trouble bipolaire, la maladie d'Alzheimer — révélant leur architecture polygénique complexe avec de nombreux variants à faible effet individuel.", ref: "Sullivan PF, Agrawal A & Bulik CM. (2018). Psychiatric genomics: an update and an agenda. Am J Psychiatry." },
                    { question: "Les mutations LRRK2 (leucine-rich repeat kinase 2) sont associées à :", options: ["Maladie de Huntington", "Formes familiales autosomiques dominantes de maladie de Parkinson", "Ataxie spinocérébelleuse type 1", "Dystrophie myotonique"], correct: 1, explanation: "Les mutations de LRRK2 (notamment G2019S) sont la cause la plus fréquente de maladie de Parkinson familiale autosomique dominante et sont retrouvées dans des cas sporadiques. LRRK2 est une kinase impliquée dans le trafic vésiculaire et l'autophagie.", ref: "Paisan-Ruiz C et al. (2004). Cloning of the gene containing mutations that cause PARK8-linked Parkinson's disease. Neuron." },
                    { question: "La thérapie génique par vecteurs AAV (adeno-associated virus) en neurologie vise à :", options: ["Séquencer le génome du patient", "Délivrer une copie fonctionnelle d'un gène défectueux directement dans les neurones cibles", "Bloquer l'expression de tous les gènes mutés", "Remplacer les neurones perdus par greffe"], correct: 1, explanation: "Les vecteurs AAV permettent de transduire efficacement les neurones avec un transgène thérapeutique. Cette approche a permis l'approbation de traitements comme l'onasemnogène abéparvovec pour l'amyotrophie spinale de type 1 (SMA1).", ref: "High KA & Roncarolo MG. (2019). Gene therapy. N Engl J Med." },
                    { question: "Les mutations de PINK1 et Parkin dans la maladie de Parkinson familiale affectent principalement :", options: ["La synthèse de dopamine", "La mitophagie et le contrôle qualité mitochondrial", "La transmission synaptique glutamatergique", "La myélinisation des axones nigro-striés"], correct: 1, explanation: "PINK1 et Parkin forment un axe de contrôle qualité mitochondrial : PINK1 s'accumule sur les mitochondries endommagées et recrute Parkin pour ubiquitiner des protéines mitochondriales, déclenchant la mitophagie sélective.", ref: "Narendra D et al. (2010). PINK1 is selectively stabilized on impaired mitochondria to activate Parkin. PLoS Biol." },
                    { question: "Le score polygénique de risque (PRS) en psychiatrie génétique permet de :", options: ["Diagnostiquer avec certitude une maladie psychiatrique", "Estimer la charge génétique agrégée d'un individu pour une maladie donnée", "Identifier une mutation causale unique", "Prédire la réponse à tout médicament psychotrope"], correct: 1, explanation: "Le PRS agrège les effets de milliers de variants génétiques communs pour estimer la susceptibilité génétique globale d'un individu. Il est utilisé comme outil de stratification du risque en recherche, mais sa valeur diagnostique individuelle reste limitée.", ref: "Torkamani A, Wineinger NE & Topol EJ. (2018). The personal and clinical utility of polygenic risk scores. Nat Rev Genet." },
                    { question: "La méthylation de l'ADN dans les neurones est un mécanisme épigénétique qui :", options: ["Modifie la séquence des bases de l'ADN", "Régule l'expression génique en modulant l'accessibilité de la chromatine", "Traduit directement les ARNm en protéines", "Répare les cassures double-brin de l'ADN"], correct: 1, explanation: "La méthylation des cytosines (CpG) réprime généralement l'expression génique en condensant la chromatine et en bloquant la liaison des facteurs de transcription. Des altérations de la méthylation sont observées dans l'autisme, la schizophrénie et les maladies neurodégénératives.", ref: "Graff J & Mansuy IM. (2009). Epigenetic codes in cognition and behaviour. Behav Brain Res." },
                    { question: "L'amyotrophie spinale (SMA) est causée par des mutations de quel gène ?", options: ["SOD1", "SMN1 (Survival Motor Neuron 1)", "HTT", "FMR1"], correct: 1, explanation: "L'amyotrophie spinale est causée par des mutations/délétions du gène SMN1, entraînant un déficit en protéine SMN essentielle à la survie des motoneurones spinaux. Le gène SMN2, paralog imparfait, modifie la sévérité clinique.", ref: "Lefebvre S et al. (1995). Identification and characterization of a spinal muscular atrophy-determining gene. Cell." }
                ],
                plasticite_cerebrale: [
                    { question: "La potentialisation à long terme (LTP) est considérée comme le principal mécanisme cellulaire de :", options: ["La mort neuronale programmée", "L'apprentissage et la mémoire synaptique", "La myélinisation axonale", "La neurogenèse adulte"], correct: 1, explanation: "La LTP, découverte par Bliss et Lømo (1973), est un renforcement durable de la transmission synaptique après stimulation à haute fréquence. Elle constitue le substrat cellulaire majeur de l'apprentissage associatif et de la mémoire.", ref: "Bliss TV & Lømo T. (1973). Long-lasting potentiation of synaptic transmission in the dentate area. J Physiol." },
                    { question: "Quelle molécule est indispensable à l'induction de la LTP via les récepteurs NMDA ?", options: ["GABA", "Dopamine", "Glutamate", "Sérotonine"], correct: 2, explanation: "Le glutamate se lie aux récepteurs NMDA (bloqués par Mg²⁺ au repos). La dépolarisation membranaire lève ce blocage, permettant l'entrée de Ca²⁺ qui déclenche la cascade moléculaire de la LTP (activation de CaMKII).", ref: "Malenka RC & Bear MF. (2004). LTP and LTD: an embarrassment of riches. Neuron." },
                    { question: "La dépression à long terme (LTD) correspond à :", options: ["Un affaiblissement durable de la transmission synaptique", "Un renforcement de la transmission synaptique", "La mort des neurones post-synaptiques", "L'élimination des récepteurs NMDA"], correct: 0, explanation: "La LTD est une diminution durable de l'efficacité synaptique induite par une stimulation à basse fréquence. Elle implique l'internalisation des récepteurs AMPA et joue un rôle dans l'oubli adaptatif et le raffinement des circuits.", ref: "Ito M. (2001). Cerebellar long-term depression: characterization, signal transduction, and functional roles. Physiol Rev." },
                    { question: "La période critique du développement visuel désigne :", options: ["La période où le cortex visuel ne peut plus être modifié", "Une fenêtre temporelle où l'expérience visuelle sculpte définitivement les circuits corticaux", "La phase de myélinisation du nerf optique", "Le développement des cellules ganglionnaires rétiniennes"], correct: 1, explanation: "Les périodes critiques sont des fenêtres développementales de haute plasticité où l'expérience sensorielle organise définitivement les circuits corticaux. Hubel et Wiesel ont montré qu'une privation visuelle pendant cette période cause des déficits permanents.", ref: "Hubel DH & Wiesel TN. (1970). The period of susceptibility to the physiological effects of unilateral eye closure in kittens. J Physiol." },
                    { question: "La neurogenèse adulte est principalement décrite dans quelle région cérébrale ?", options: ["Cortex préfrontal", "Zone sous-ventriculaire et gyrus denté de l'hippocampe", "Cervelet", "Tronc cérébral"], correct: 1, explanation: "La neurogenèse adulte persiste principalement dans la zone sous-granulaire du gyrus denté hippocampique et la zone sous-ventriculaire. Elle est régulée par l'exercice, l'apprentissage, le stress et certains antidépresseurs.", ref: "Eriksson PS et al. (1998). Neurogenesis in the adult human hippocampus. Nat Med." },
                    { question: "La plasticité cérébrale après lésion corticale chez l'adulte est illustrée par :", options: ["L'absence totale de récupération fonctionnelle", "La réorganisation corticale avec expansion des représentations adjacentes", "La régénération complète des axones lésés", "La transplantation automatique de neurones"], correct: 1, explanation: "Après une lésion corticale, les régions adjacentes peuvent prendre en charge les fonctions perdues via une réorganisation des cartes corticales (plasticité vicariant). Merzenich a montré cela sur les cartes somato-sensorielles.", ref: "Merzenich MM et al. (1983). Topographic reorganization of somatosensory cortical areas following peripheral nerve injury. Neuroscience." },
                    { question: "Le phénomène de potentialisation synaptique dépendante de l'activité (STDP) stipule que :", options: ["Toute activité neuronale renforce les synapses", "Le renforcement ou l'affaiblissement dépend de la précision temporelle relative des spikes pré et post-synaptiques", "L'activité post-synaptique seule suffit à modifier la synapse", "La LTP ne dépend pas du timing neuronal"], correct: 1, explanation: "La STDP (Spike-Timing Dependent Plasticity) est une forme de plasticité hebbienne où la synapse est renforcée si le neurone pré-synaptique s'active avant le post-synaptique (LTP), et affaiblie dans le cas inverse (LTD).", ref: "Bi G & Poo M. (1998). Synaptic modifications in cultured hippocampal neurons: dependence on spike timing. J Neurosci." },
                    { question: "Quelle thérapie de rééducation exploite la plasticité cérébrale après AVC moteur ?", options: ["Chimiothérapie", "Thérapie par contrainte induite du mouvement (CIMT)", "Radiothérapie", "Dialyse neuronale"], correct: 1, explanation: "La CIMT (Constraint-Induced Movement Therapy) contraint le patient à n'utiliser que le membre parétique en immobilisant le membre sain, forçant la réorganisation corticale et la récupération motrice après AVC.", ref: "Taub E, Uswatte G & Elbert T. (2002). New treatments in neurorehabilitation founded on basic research. Nat Rev Neurosci." },
                    { question: "Le facteur neurotrophique BDNF (Brain-Derived Neurotrophic Factor) joue quel rôle dans la plasticité ?", options: ["Il inhibe la LTP", "Il favorise la survie neuronale, la croissance synaptique et la LTP via le récepteur TrkB", "Il bloque les récepteurs NMDA", "Il réduit la neurogenèse adulte"], correct: 1, explanation: "Le BDNF, en se liant à son récepteur TrkB, active des cascades de signalisation (MAPK, PI3K) qui favorisent la survie neuronale, la croissance des épines dendritiques et l'expression de la LTP. Son expression est augmentée par l'exercice.", ref: "Minichiello L. (2009). TrkB signalling pathways in LTP and learning. Nat Rev Neurosci." },
                    { question: "La loi de Hebb (1949) stipule que :", options: ["Les neurones inactifs renforcent leurs connexions", "Des neurones qui s'activent ensemble renforcent leurs connexions synaptiques", "La LTP ne nécessite pas d'activité post-synaptique", "Les synapses inhibitrices sont renforcées par l'activité"], correct: 1, explanation: "La règle hebbienne postule que si un neurone A active répétitivement un neurone B, l'efficacité synaptique de A sur B augmente. Cette règle résume la base de la plasticité associative et constitue le fondement théorique de la LTP.", ref: "Hebb DO. (1949). The Organization of Behavior. Wiley." },
                    { question: "Quel effet l'exercice physique aérobie a-t-il sur l'hippocampe ?", options: ["Il réduit le volume hippocampique", "Il augmente le volume et la neurogenèse hippocampique via le BDNF", "Il n'a aucun effet sur la structure cérébrale", "Il inhibe la LTP"], correct: 1, explanation: "L'exercice aérobie augmente la production de BDNF, stimule la neurogenèse dans le gyrus denté hippocampique et augmente le volume hippocampique, avec des effets bénéfiques sur la mémoire spatiale et la cognition.", ref: "van Praag H et al. (1999). Running increases cell proliferation and neurogenesis in the adult mouse dentate gyrus. Nat Neurosci." },
                    { question: "La plasticité homéostatique (synaptic scaling) permet de :", options: ["Renforcer indéfiniment toutes les synapses actives", "Maintenir la stabilité du réseau neuronal en ajustant globalement la force de toutes les synapses", "Éliminer sélectivement les synapses les plus faibles", "Bloquer la LTP après une phase d'apprentissage intense"], correct: 1, explanation: "La plasticité homéostatique ajuste globalement la force de toutes les synapses d'un neurone pour maintenir son niveau d'activité dans une plage optimale — mécanisme crucial pour éviter l'emballement ou le silence des circuits neuronaux.", ref: "Turrigiano GG & Nelson SB. (2004). Homeostatic plasticity in the developing nervous system. Nat Rev Neurosci." },
                    { question: "Le phénomène de membre fantôme après amputation illustre :", options: ["La rigidité des cartes corticales adultes", "La réorganisation plastique du cortex somatosensoriel primaire", "L'absence de plasticité cérébrale chez l'adulte", "Un artefact de l'imagerie cérébrale"], correct: 1, explanation: "Après amputation, la représentation corticale du membre perdu est envahie par les régions adjacentes (main → visage), générant des sensations dans le membre fantôme. Cette réorganisation illustre la plasticité persistante du cortex somatosensoriel adulte.", ref: "Ramachandran VS & Hirstein W. (1998). The perception of phantom limbs. Brain." },
                    { question: "La réhabilitation cognitive après lésion cérébrale exploite la plasticité en favorisant :", options: ["Le remplacement chirurgical des neurones lésés", "La vicariance (prise en charge par d'autres régions) et la compensation comportementale", "L'utilisation exclusive des régions lésées", "La suppression des connexions collatérales"], correct: 1, explanation: "La rééducation neuropsychologique exploite la plasticité vicariant (recrutement de régions épargnées pour assumer les fonctions lésées) et la compensation comportementale (nouvelles stratégies pour contourner le déficit).", ref: "Robertson IH & Murre JM. (1999). Rehabilitation of brain damage: brain plasticity and principles of guided recovery. Psychol Bull." },
                    { question: "Quelle est la fenêtre temporelle optimale pour la plasticité cérébrale maximale après un AVC ?", options: ["6-12 mois après l'AVC", "Les premières semaines à 3 mois post-AVC", "Uniquement dans les 24 premières heures", "La plasticité est uniforme dans le temps"], correct: 1, explanation: "La récupération post-AVC suit une courbe d'intensité décroissante : la plasticité est maximale dans les premières semaines (phase sous-aiguë), quand les mécanismes de diaschisis se résolvent et que les réorganisations corticales sont les plus actives.", ref: "Cramer SC. (2008). Repairing the human brain after stroke: I. Mechanisms of spontaneous recovery. Ann Neurol." },
                    { question: "La tDCS (stimulation transcrânienne à courant direct) module la plasticité cérébrale en :", options: ["Générant des potentiels d'action directs", "Modulant la polarisation membranaire de repos et l'excitabilité corticale", "Remplaçant les neurones endommagés", "Augmentant la myélinisation"], correct: 1, explanation: "La tDCS anodique augmente l'excitabilité corticale (dépolarisation membranaire), facilitant la LTP-like plasticity, tandis que la tDCS cathodique la diminue. Elle est utilisée en recherche et en rééducation pour moduler non-invasivement l'excitabilité corticale.", ref: "Nitsche MA & Paulus W. (2000). Excitability changes induced in the human motor cortex by weak transcranial direct current stimulation. J Physiol." },
                    { question: "L'élagage synaptique (synaptic pruning) durant l'adolescence est médié principalement par :", options: ["Les neurones GABAergiques", "Les cellules microgliales via le complément", "Les astrocytes uniquement", "Les cellules de Schwann"], correct: 1, explanation: "La microglie, via le système du complément (C1q, C3), élimine sélectivement les synapses les moins actives durant le développement et l'adolescence, raffinant les circuits neuronaux. Des altérations de ce processus sont impliquées dans la schizophrénie.", ref: "Schafer DP et al. (2012). Microglia sculpt postnatal neural circuits in an activity and complement-dependent manner. Neuron." },
                    { question: "Quelle technique de neurostimulation exploite la plasticité pour traiter la dépression résistante ?", options: ["IRM fonctionnelle", "Stimulation magnétique transcrânienne répétitive (rTMS) sur le cortex préfrontal gauche", "EEG quantitatif", "TEP au FDG"], correct: 1, explanation: "La rTMS à haute fréquence (10 Hz) sur le cortex préfrontal dorsolatéral gauche induit une potentialisation de l'activité de cette région hypoactive dans la dépression, avec des effets antidépresseurs prouvés par des essais contrôlés randomisés.", ref: "George MS et al. (2010). Daily left prefrontal transcranial magnetic stimulation therapy for major depressive disorder. Arch Gen Psychiatry." },
                    { question: "Le concept de 'réserve cognitive' stipule que :", options: ["Un cerveau plus grand est immunisé contre la démence", "L'éducation, la stimulation intellectuelle et les activités sociales confèrent une protection contre les effets cliniques de la pathologie cérébrale", "Le QI est génétiquement déterminé et non modifiable", "La réserve cérébrale est identique pour tous les individus"], correct: 1, explanation: "La réserve cognitive (Stern, 2002) désigne la capacité du cerveau à compenser activement les dommages neuropathologiques grâce à des stratégies cognitives alternatives. Elle est associée au niveau d'éducation, à l'activité intellectuelle et aux stimulations sociales.", ref: "Stern Y. (2002). What is cognitive reserve? Theory and research application of the reserve concept. J Int Neuropsychol Soc." },
                    { question: "La plasticité dépendante de l'expérience chez l'adulte est illustrée par :", options: ["L'absence de modification cérébrale après apprentissage intensif", "L'augmentation de la matière grise dans les régions utilisées (ex: hippocampe des taxistes londoniens)", "La réduction invariable de la matière grise avec l'âge", "L'impossibilité de créer de nouvelles synapses après 25 ans"], correct: 1, explanation: "Maguire et al. (2000) ont montré que les taxistes londoniens ont un hippocampe postérieur plus volumineux corrélé à leurs années d'expérience, démontrant que l'utilisation intensive d'une région entraîne des modifications structurelles mesurables.", ref: "Maguire EA et al. (2000). Navigation-related structural change in the hippocampi of taxi drivers. PNAS." }
                ],
                neuroethique_methodes: [
                    { question: "Le principe de bienfaisance en neuroéthique implique :", options: ["Ne jamais expérimenter sur des humains", "Maximiser les bénéfices de la recherche et des interventions pour les participants", "Interdire toute utilisation des neurosciences en justice", "Refuser les traitements non-pharmacologiques"], correct: 1, explanation: "Le principe de bienfaisance, issu du rapport Belmont (1979), oblige les chercheurs et cliniciens à maximiser les bénéfices et minimiser les risques pour les participants. Il guide l'éthique de la recherche en neurosciences.", ref: "National Commission for the Protection of Human Subjects. (1979). The Belmont Report. DHEW." },
                    { question: "Le consentement éclairé en recherche neurologique requiert :", options: ["Uniquement la signature du tuteur légal", "Une information complète, compréhensible, avec liberté de refus sans pression", "L'accord de l'équipe médicale seule", "La présence obligatoire d'un avocat"], correct: 1, explanation: "Le consentement éclairé exige que le participant reçoive une information complète sur la recherche, la comprenne, soit capable de décider librement et sans contrainte, et puisse se retirer à tout moment sans conséquence.", ref: "Beauchamp TL & Childress JF. (2019). Principles of Biomedical Ethics, 8e éd. Oxford University Press." },
                    { question: "La neuro-amélioration cognitive (cognitive enhancement) par médicaments soulève principalement quel problème éthique ?", options: ["L'efficacité thérapeutique exclusive", "L'équité d'accès, la coercition et l'authenticité du soi amélioré", "L'absence totale d'effets secondaires", "La légalité universelle de ces substances"], correct: 1, explanation: "Les neuro-améliorants (modafinil, méthylphénidate) chez des sujets sains soulèvent des questions d'équité (accès inégal), de coercition implicite dans les milieux compétitifs, et de modification de l'identité personnelle.", ref: "Greely H et al. (2008). Towards responsible use of cognitive-enhancing drugs by the healthy. Nature." },
                    { question: "La validité écologique d'un test neuropsychologique désigne :", options: ["Sa capacité à mesurer ce qu'il prétend mesurer", "Le degré auquel ses résultats prédisent le fonctionnement réel dans la vie quotidienne", "Sa fidélité test-retest", "Sa standardisation sur un échantillon représentatif"], correct: 1, explanation: "La validité écologique évalue dans quelle mesure les performances à un test neuropsychologique standardisé prédisent les capacités fonctionnelles du patient dans son environnement quotidien, au-delà des conditions artificielles de laboratoire.", ref: "Sbordone RJ & Long CJ. (1996). Ecological Validity of Neuropsychological Testing. St. Lucie Press." },
                    { question: "Le double aveugle en neuropsychologie expérimentale sert à :", options: ["Tester deux groupes de patients simultanément", "Contrôler les biais de l'expérimentateur et des participants sur les résultats", "Augmenter la taille de l'échantillon", "Éviter le recours aux statistiques"], correct: 1, explanation: "Dans un protocole en double aveugle, ni le participant ni l'expérimentateur ne connaissent la condition assignée (traitement/placebo), éliminant ainsi les biais d'attente et de confirmation qui fausseraient les mesures.", ref: "Shadish WR, Cook TD & Campbell DT. (2002). Experimental and Quasi-Experimental Designs. Houghton Mifflin." },
                    { question: "La fidélité test-retest d'un instrument neuropsychologique mesure :", options: ["La cohérence des résultats d'un même test administré à deux moments différents", "La corrélation entre deux tests différents mesurant le même concept", "La validité du test sur différentes cultures", "La sensibilité du test aux effets de pratique"], correct: 0, explanation: "La fidélité test-retest quantifie la stabilité temporelle d'un instrument : un coefficient de corrélation élevé (r > 0.80) entre deux passations indique que le test mesure de façon reproductible une caractéristique stable.", ref: "Lezak MD et al. (2012). Neuropsychological Assessment, 5e éd. Oxford University Press." },
                    { question: "Le biais de publication en neurosciences expérimentales désigne :", options: ["La tendance à publier uniquement des résultats positifs (significatifs)", "La préférence des revues pour les études longitudinales", "L'obligation de publier en anglais", "Le recours exclusif à l'IRMf"], correct: 0, explanation: "Le biais de publication (file-drawer problem) désigne la sur-représentation des résultats positifs dans la littérature, les résultats négatifs restant dans les tiroirs. Il gonfle artificiellement les tailles d'effet et nuit à la réplicabilité.", ref: "Ioannidis JP. (2005). Why most published research findings are false. PLoS Med." },
                    { question: "L'utilisation des neurosciences dans le domaine judiciaire (neurolaw) pose notamment la question de :", options: ["La précision des IRMf comme preuve de culpabilité absolue", "La réductibilité de la responsabilité pénale à des données cérébrales", "L'interdiction de toute expertise psychiatrique", "La suppression des jurys populaires"], correct: 1, explanation: "La neurolaw interroge si des données neurobiologiques (IRMf, génétique) peuvent ou doivent moduler la responsabilité pénale. La réduction du comportement criminel à des substrats cérébraux menace les fondements juridiques de la culpabilité.", ref: "Morse SJ. (2011). Brain overclaim syndrome and criminal responsibility. Ohio State J Crim Law." },
                    { question: "L'effet placebo en neuropsychiatrie s'explique notamment par :", options: ["L'absence d'activité cérébrale lors de la prise de placebo", "La libération de dopamine et d'opioïdes endogènes dans des circuits de récompense", "Une simple suggestion sans substrat neurobiologique", "L'activation exclusive du cortex préfrontal gauche"], correct: 1, explanation: "L'imagerie cérébrale a montré que l'effet placebo implique la libération de dopamine dans le striatum et d'opioïdes endogènes dans le cortex cingulaire, démontrant un substrat neurobiologique réel derrière la réponse placebo.", ref: "de la Fuente-Fernández R & Stoessl AJ. (2002). The placebo effect in Parkinson's disease. Trends Neurosci." },
                    { question: "La méthode des cas multiples en neuropsychologie cognitive permet de :", options: ["Généraliser immédiatement à la population générale", "Dissocier des composantes fonctionnelles grâce à des profils de déficits différents entre patients", "Remplacer les études de groupe par une seule observation", "Mesurer l'activité cérébrale directement"], correct: 1, explanation: "L'approche par cas multiples permet d'établir des dissociations entre fonctions : si certains patients sont déficitaires en A mais pas B, et d'autres en B mais pas A, on infère l'indépendance fonctionnelle de A et B.", ref: "Caramazza A. (1986). On drawing inferences about the structure of normal cognitive systems from the analysis of patterns of impaired performance. Brain Cogn." },
                    { question: "La taille d'effet (effect size) en neuropsychologie expérimentale est préférée à la valeur p car :", options: ["Elle remplace entièrement la valeur p dans toutes les analyses", "Elle quantifie l'ampleur clinique ou pratique d'une différence, indépendamment de la taille de l'échantillon", "Elle est toujours supérieure à 1", "Elle supprime la nécessité du contrôle statistique"], correct: 1, explanation: "Contrairement à la valeur p (influencée par la taille d'échantillon), la taille d'effet (Cohen's d, η², r) quantifie l'amplitude réelle d'un effet. Un résultat peut être statistiquement significatif mais cliniquement négligeable avec un grand N.", ref: "Cohen J. (1988). Statistical Power Analysis for the Behavioral Sciences, 2e éd. Lawrence Erlbaum." },
                    { question: "Le problème de la comparabilité des groupes (matching) dans les études cas-témoins en neuropsychologie vise à contrôler :", options: ["Les différences de taille d'effet", "Les variables confondantes (âge, QI, niveau d'éducation, latéralité)", "Le biais de publication", "L'effet de l'expérimentateur"], correct: 1, explanation: "En appairiant les patients et témoins sur des variables comme l'âge, le sexe, le niveau d'éducation et le QI prémorbide, on s'assure que les différences observées reflètent l'effet de la condition étudiée et non de facteurs confondants.", ref: "Lezak MD et al. (2012). Neuropsychological Assessment, 5e éd. Oxford University Press." },
                    { question: "L'anonymisation des données neurologiques (IRMf, génomique) est une exigence éthique car :", options: ["Les données cérébrales et génétiques sont potentiellement identificatrices et sensibles", "Elle améliore la qualité statistique des analyses", "Elle est facultative pour les données de recherche fondamentale", "Elle concerne uniquement les données psychiatriques"], correct: 1, explanation: "Les données d'imagerie cérébrale (IRMf structurale) permettent la reconstruction du visage et sont identificatrices. Les données génomiques permettent d'identifier l'individu et ses apparentés. Leur anonymisation rigoureuse est une obligation éthique et légale (RGPD).", ref: "Gymrek M et al. (2013). Identifying personal genomes by surname inference. Science." },
                    { question: "Le principe de justice en éthique de la recherche neurologique implique :", options: ["Que les chercheurs soient rémunérés équitablement", "Une distribution équitable des bénéfices et des risques de la recherche entre tous les groupes de population", "Que seuls les patients atteints bénéficient de la recherche", "L'exclusion systématique des populations vulnérables"], correct: 1, explanation: "Le principe de justice (Belmont Report) exige que les bénéfices et les risques de la recherche soient répartis équitablement, sans exploitation des populations vulnérables ni exclusion injustifiée de groupes qui bénéficieraient des avancées.", ref: "National Commission for the Protection of Human Subjects. (1979). The Belmont Report. DHEW." },
                    { question: "Le z-score en neuropsychologie clinique permet de :", options: ["Calculer la corrélation entre deux tests", "Situer la performance d'un patient par rapport à une population normative de référence", "Mesurer la fidélité inter-juges", "Estimer la taille d'effet d'une intervention"], correct: 1, explanation: "Le z-score exprime l'écart d'une performance individuelle à la moyenne normative en unités d'écart-type (z = (X-μ)/σ). Un z < -1.5 ou -2 indique généralement un déficit cliniquement significatif par rapport à la norme.", ref: "Crawford JR & Howell DC. (1998). Comparing an individual's test score against norms derived from small samples. Clin Neuropsychol." },
                    { question: "La crise de réplication en neurosciences cognitives est principalement due à :", options: ["Des erreurs délibérées des chercheurs", "Des échantillons insuffisants, des analyses flexibles et le biais de publication", "L'absence de protocoles éthiques", "Des instruments de mesure défectueux"], correct: 1, explanation: "La crise de réplication résulte de la combinaison de faibles puissances statistiques (petits N), de pratiques d'analyse questionnables (p-hacking, HARKing) et du biais de publication, gonflant artificiellement les tailles d'effet et produisant des résultats non réplicables.", ref: "Open Science Collaboration. (2015). Estimating the reproducibility of psychological science. Science." },
                    { question: "Qu'est-ce que le 'neuro-imaging confound' (biais de l'IRMf) lié au mouvement de la tête ?", options: ["Une amélioration artificielle de la résolution spatiale", "Des artefacts de mouvement qui corrèlent avec les variables d'intérêt, faussant les résultats", "Un renforcement du signal BOLD", "Une amélioration de la connectivité fonctionnelle mesurée"], correct: 1, explanation: "Les mouvements de tête en IRMf créent des artefacts qui peuvent corréler systématiquement avec des variables psychologiques (ex: patients psychiatriques bougent plus), faussant les cartes d'activation et de connectivité. La correction par realignment est indispensable.", ref: "Power JD et al. (2012). Spurious but systematic correlations in functional connectivity MRI networks arise from subject motion. NeuroImage." },
                    { question: "La standardisation d'un test neuropsychologique implique :", options: ["Son utilisation dans tous les pays du monde sans adaptation", "Son administration et sa cotation selon des procédures uniformes sur un échantillon normatif représentatif", "L'exclusion de toute adaptation culturelle", "Sa traduction automatique dans toutes les langues"], correct: 1, explanation: "La standardisation garantit que tous les administrateurs suivent exactement les mêmes procédures et que les scores sont interprétés par référence à des normes établies sur un échantillon représentatif de la population cible.", ref: "Strauss E, Sherman EMS & Spreen O. (2006). A Compendium of Neuropsychological Tests, 3e éd. Oxford University Press." },
                    { question: "L'interface cerveau-machine (BCI) soulève la question éthique de :", options: ["L'amélioration exclusive des performances sportives", "L'agentivité, la vie privée des pensées et la responsabilité en cas de mauvais fonctionnement", "L'interdiction totale de la neurostimulation", "La propriété intellectuelle des neurosciences fondamentales"], correct: 1, explanation: "Les BCIs qui lisent l'activité cérébrale pour contrôler des dispositifs externes soulèvent des questions d'agentivité (qui contrôle l'action ?), de confidentialité des données neurales, et de responsabilité légale lorsqu'une commande cérébrale déclenche un comportement non intentionnel.", ref: "Nijboer F et al. (2013). A survey of the ethical issues and requirements of brain-computer interfaces. J Inf Technol Healthcare." },
                    { question: "La validité de construit d'un test neuropsychologique est établie par :", options: ["Sa corrélation avec d'autres tests mesurant le même construit et sa capacité à en différencier des distincts", "Sa facilité d'administration", "Son ancienneté dans la pratique clinique", "Sa longueur et le nombre d'items"], correct: 1, explanation: "La validité de construit vérifie que le test mesure bien le concept théorique visé, via la validité convergente (corrélation avec des tests similaires) et discriminante (faible corrélation avec des tests de construits différents), souvent via l'analyse factorielle confirmatoire.", ref: "Cronbach LJ & Meehl PE. (1955). Construct validity in psychological tests. Psychol Bull." }
                ]
            };

            // Fusionner toutes les questions dans un seul tableau
            const allQuestions = [];
            for (const category in categories) {
                allQuestions.push(...categories[category].map(q => ({ ...q, category })));
            }
            return allQuestions;
        }

        // Variables
        let quizData = [];
        let currentQuestion = 0;
        let score = 0;
        let userAnswers = [];
        let isDailyMode = false;
        let selectedCategories = ["all"];

        // Éléments DOM
        const questionEl = document.getElementById("question");
        const optionsEl = document.getElementById("options");
        const prevBtn = document.getElementById("prev-btn");
        const nextBtn = document.getElementById("next-btn");
        const scoreContainerEl = document.getElementById("score-container");
        const scoreEl = document.getElementById("score");
        const scoreMaxEl = document.getElementById("score-max");
        const scoreMessageEl = document.getElementById("score-message");
        const restartBtn = document.getElementById("restart-btn");
        const fullModeBtn = document.getElementById("full-mode-btn");
        const dailyModeBtn = document.getElementById("daily-mode-btn");
        const categoryBtn = document.getElementById("category-btn");
        const categoryDropdown = document.getElementById("category-dropdown");
        const validateCategoriesBtn = document.getElementById("validate-categories");
        const selectedCategoriesEl = document.getElementById("selected-categories");
        const dailyInfoEl = document.getElementById("daily-info");
        const refBoxEl = document.getElementById("ref-box");

        // Initialiser les questions
        const allQuestions = generateQuestions();

        // Initialisation du quiz
        // Algorithme Fisher-Yates : mélange vraiment aléatoire
        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function initQuiz() {
            if (isDailyMode) {
                // Mode quotidien : 10 questions aléatoires (Fisher-Yates)
                quizData = shuffle(allQuestions).slice(0, 10);
                dailyInfoEl.style.display = "block";
            } else {
                // Mode complet ou sélection de catégories — toujours mélangé
                const pool = selectedCategories.includes("all")
                    ? allQuestions
                    : allQuestions.filter(q => selectedCategories.includes(q.category));
                quizData = shuffle(pool);
                dailyInfoEl.style.display = "none";
            }

            currentQuestion = 0;
            score = 0;
            userAnswers = Array(quizData.length).fill(null);
            loadQuestion();
            updateUI();
        }

        // Charger une question
        function loadQuestion() {
            if (quizData.length === 0) {
                questionEl.textContent = "Aucune question disponible pour les catégories sélectionnées.";
                optionsEl.innerHTML = "";
                return;
            }

            const question = quizData[currentQuestion];
            questionEl.textContent = question.question;
            refBoxEl.style.display = "none"; refBoxEl.innerHTML = "";

            optionsEl.innerHTML = "";
            question.options.forEach((option, index) => {
                const optionEl = document.createElement("div");
                optionEl.classList.add("option");
                optionEl.textContent = option;
                optionEl.addEventListener("click", () => selectOption(index));
                if (userAnswers[currentQuestion] === index) {
                    optionEl.classList.add("selected");
                }
                optionsEl.appendChild(optionEl);
            });

            updateUI();
        }

        // Sélectionner une option
        function selectOption(index) {
            if (userAnswers[currentQuestion] !== null) return;

            userAnswers[currentQuestion] = index;
            const question = quizData[currentQuestion];

            // Mettre à jour les options
            const options = optionsEl.querySelectorAll(".option");
            options.forEach((option, i) => {
                option.classList.remove("selected", "correct", "incorrect");
                if (i === index) {
                    option.classList.add("selected");
                    if (i === question.correct) {
                        option.classList.add("correct");
                        score++;
                    } else {
                        option.classList.add("incorrect");
                    }
                }
            });

            // Toujours montrer la bonne réponse en vert
            options[question.correct].classList.add("correct");

            // Afficher référence + bonne réponse si erreur
            let refHtml = '';
            if (question.explanation) {
                refHtml += '<span class="explanation-text">' + question.explanation + '</span>';
            }
            refHtml += '<span class="ref-label">📚 Référence</span>' + (question.ref || question.source || 'Non disponible');
            if (index !== question.correct) {
                refHtml += '<span class="correct-answer-hint">✓ Bonne réponse : ' + question.options[question.correct] + '</span>';
            }
            refBoxEl.innerHTML = refHtml;
            refBoxEl.style.display = "block";

            updateUI();
        }

        // Mettre à jour l'UI
        function updateUI() {
            prevBtn.disabled = currentQuestion === 0;
            nextBtn.textContent = currentQuestion < quizData.length - 1 ? "Suivant" : "Terminer";
            scoreMaxEl.textContent = quizData.length;

            if (currentQuestion === quizData.length - 1 && userAnswers[currentQuestion] !== null) {
                nextBtn.onclick = showScore;
            } else {
                nextBtn.onclick = nextQuestion;
            }
        }

        // Question suivante
        function nextQuestion() {
            if (currentQuestion < quizData.length - 1) {
                currentQuestion++;
                loadQuestion();
            }
        }

        // Question précédente
        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                loadQuestion();
            }
        }

        // Afficher le score
        function showScore() {
            scoreContainerEl.style.display = "block";
            scoreEl.textContent = score;

            const percentage = (score / quizData.length) * 100;
            if (percentage === 100) {
                scoreMessageEl.textContent = "🏆 Parfait ! Tu es un expert !";
            } else if (percentage >= 80) {
                scoreMessageEl.textContent = "⭐ Excellent travail !";
            } else if (percentage >= 50) {
                scoreMessageEl.textContent = "👍 Bien joué !";
            } else {
                scoreMessageEl.textContent = "📖 Relis tes cours !";
            }

            restartBtn.style.display = "block";
            nextBtn.style.display = "none";
            prevBtn.style.display = "none";
        }

        // Changer de mode
        function setMode(daily) {
            isDailyMode = daily;
            fullModeBtn.classList.toggle("active", !daily);
            dailyModeBtn.classList.toggle("active", daily);

            // Réinitialiser les catégories si on passe en mode quotidien
            if (daily) {
                selectedCategories = ["all"];
                document.getElementById("all").checked = true;
                categoryDropdown.querySelectorAll('input[type="checkbox"]:not(#all)').forEach(cb => {
                    cb.checked = false;
                });
                selectedCategoriesEl.classList.remove("show");
                fullModeBtn.textContent = "Quiz complet";
            }

            initQuiz();
        }

        // Gérer le dropdown des catégories
        function toggleDropdown() {
            categoryDropdown.classList.toggle("show");
        }

        // Valider les catégories sélectionnées
        function validateCategories() {
            const checkboxes = categoryDropdown.querySelectorAll("input[type='checkbox']");
            selectedCategories = [];
            checkboxes.forEach(cb => {
                if (cb.checked) {
                    selectedCategories.push(cb.id);
                }
            });

            // Mettre à jour l'affichage
            selectedCategoriesEl.innerHTML = "<span>Sélection : </span>";
            if (selectedCategories.includes("all")) {
                selectedCategoriesEl.innerHTML += "<span class='category-tag'>Toutes</span>";
                fullModeBtn.textContent = "Quiz complet";
            } else {
                const categoryNames = {
                    neuroanatomie: "Neuroanatomie",
                    neurotransmetteurs: "Neurotransmetteurs",
                    memoire: "Mémoire",
                    langage: "Langage",
                    "fonctions-executives": "Fonctions exécutives",
                    attention: "Attention",
                    pathologies: "Pathologies",
                    troubles_psychiatriques: "Troubles psychiatriques",
                    neurodeveloppement: "Neurodéveloppement",
                    neuroimagerie: "Neuroimagerie",
                    emotions_cognition_sociale: "Émotions & Cognition sociale",
                    troubles_mouvement: "Troubles du mouvement",
                    neurogenetique: "Neurogénétique",
                    plasticite_cerebrale: "Plasticité cérébrale",
                    neuroethique_methodes: "Neuroéthique & Méthodes"
                };
                selectedCategories.forEach(cat => {
                    selectedCategoriesEl.innerHTML += `<span class='category-tag'>${categoryNames[cat] || cat}</span>`;
                });
                fullModeBtn.textContent = "Quiz sélection";
            }
            selectedCategoriesEl.classList.add("show");
            categoryDropdown.classList.remove("show");
            initQuiz();
        }

        // Fermer le dropdown si on clique à l'extérieur
        document.addEventListener("click", (e) => {
            if (!categoryBtn.contains(e.target) && !categoryDropdown.contains(e.target)) {
                categoryDropdown.classList.remove("show");
            }
        });

        // Gérer les checkboxes (désactiver "Toutes" si une autre case est cochée)
        categoryDropdown.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            cb.addEventListener("change", function() {
                if (this.id === "all" && this.checked) {
                    categoryDropdown.querySelectorAll('input[type="checkbox"]:not(#all)').forEach(otherCb => {
                        otherCb.checked = false;
                    });
                } else if (this.checked) {
                    document.getElementById("all").checked = false;
                }
            });
        });

        // Événements
        fullModeBtn.addEventListener("click", () => setMode(false));
        dailyModeBtn.addEventListener("click", () => setMode(true));
        categoryBtn.addEventListener("click", toggleDropdown);
        validateCategoriesBtn.addEventListener("click", validateCategories);
        prevBtn.addEventListener("click", prevQuestion);
        nextBtn.addEventListener("click", nextQuestion);
        restartBtn.addEventListener("click", initQuiz);

        // Initialiser
        initQuiz();
    </script>


    <script>
        // Splash screen
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                if (splash) {
                    splash.classList.add('hide');
                    setTimeout(() => splash.remove(), 600);
                }
            }, 1200);
        });
    </script>


    <script>
        // Détection offline/online
        function showToast(msg) {
            const t = document.createElement('div');
            t.textContent = msg;
            t.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#2C3E50;color:white;padding:10px 20px;border-radius:20px;font-size:0.85rem;z-index:9998;opacity:0;transition:opacity 0.3s;white-space:nowrap';
            document.body.appendChild(t);
            requestAnimationFrame(() => { t.style.opacity = '1'; });
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 3000);
        }
        window.addEventListener('offline', () => showToast('📵 Mode hors ligne — Quiz disponible'));
        window.addEventListener('online',  () => showToast('✅ Connexion rétablie'));
    </script>


    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/Quiz-Neuropsychologie/sw.js', {
                    scope: '/Quiz-Neuropsychologie/'
                }).then(reg => {
                    console.log('✅ SW enregistré:', reg.scope);
                }).catch(err => {
                    console.warn('SW erreur:', err);
                });
            });
        }
    </script>
