                    { question: "Quel trouble est caractérisé par une difficulté à filtrer les stimuli non pertinents ?", options: ["TDAH", "Schizophrénie", "Trouble bipolaire", "TOC"], correct: 0, explanation: "Le TDAH présente un déficit majeur de filtrage des stimuli non pertinents, lié à une hypoactivité du cortex préfrontal droit et des circuits inhibiteurs striato-frontaux. Les tests d'interférence (Stroop, flankers) révèlent une difficulté à supprimer les réponses automatiques aux distracteurs.", ref: "Posner MI (2012). Attention in a Social World. Oxford University Press." }
                ],
                pathologies: [
                    { question: "La maladie d'Alzheimer est caractérisée par l'accumulation de quelle protéine ?", options: ["Alpha-synucléine", "Protéine Tau", "Bêta-amyloïde", "Prion"], correct: 2, explanation: "La MA se caractérise par deux lésions histologiques : les plaques amyloïdes (dépôts extracellulaires de peptide A-bêta-42) et les dégénérescences neurofibrillaires (enchevêtrements intraneuronaux de protéine Tau hyperphosphorylée). L'hypothèse de la cascade amyloïde place A-bêta en événement initiateur.", ref: "Jack CR et al. (2018). NIA-AA Research Framework for Alzheimer\'s disease. Alzheimers Dement." },
                    { question: "La maladie de Parkinson est principalement associée à la dégénérescence de quelles cellules ?", options: ["Cellules de Purkinje", "Neurones dopaminergiques de la substance noire", "Neurones cholinergiques", "Cellules gliales"], correct: 1, explanation: "La MP est caractérisée par la perte progressive des neurones dopaminergiques de la substantia nigra pars compacta. Au diagnostic clinique, plus de 60-80% de ces neurones sont déjà détruits. Les corps de Lewy (agrégats d'alpha-synucléine) sont la marque histopathologique de la maladie.", ref: "Kalia LV & Lang AE (2015). Parkinson\'s disease. Lancet." },
                    { question: "La sclérose en plaques est une maladie qui affecte principalement :", options: ["Les neurones", "La myéline", "Les vaisseaux sanguins", "Les cellules gliales"], correct: 1, explanation: "La SEP est une maladie auto-immune démyélinisante du SNC où des lymphocytes T attaquent la myéline. Les plaques de démyélinisation interrompent la conduction nerveuse saltatoire, produisant des déficits neurologiques variables. L'IRM montre des lésions en hypersignal T2 périventriculaires.", ref: "Compston A & Coles A (2008). Multiple sclerosis. Lancet." },
                    { question: "La maladie de Huntington est causée par une mutation sur quel chromosome ?", options: ["Chromosome 4", "Chromosome 21", "Chromosome X", "Chromosome 1"], correct: 0, explanation: "La MH est causée par une expansion de répétitions CAG (supérieur à 36) dans le gène HTT sur le chromosome 4, codant la huntingtine. Elle est autosomique dominante avec pénétrance complète. Plus le nombre de répétitions est élevé, plus l'âge d'apparition est précoce (anticipation génétique).", ref: "Ross CA & Tabrizi SJ (2011). Huntington\'s disease. Lancet Neurol." },
                    { question: "Quel syndrome est associé à une carence en vitamine B1 ?", options: ["Syndrome de Korsakoff", "Syndrome de Guillain-Barré", "Syndrome de Tourette", "Syndrome de Down"], correct: 0, explanation: "Le syndrome de Wernicke-Korsakoff résulte d'une carence en thiamine (B1), fréquente chez les alcooliques. La phase aiguë (encéphalopathie de Wernicke) se manifeste par la triade : confusion, ataxie, ophtalmoplégie. Sans traitement, elle évolue vers l'amnésie chronique de Korsakoff.", ref: "Lishman WA (1998). Organic Psychiatry, 3e éd. Blackwell Science." },
                    { question: "La maladie de Creutzfeldt-Jakob est causée par :", options: ["Un virus", "Un prion", "Une bactérie", "Un champignon"], correct: 1, explanation: "La MCJ est une encéphalopathie spongiforme transmissible causée par des prions : des protéines PrP normales mal repliées (PrPSc) qui convertissent catalytiquement d'autres protéines PrP normales. Elle provoque une démence rapidement progressive, fatale en quelques mois.", ref: "Prusiner SB (1998). Prions. PNAS." },
                    { question: "Quel est le principal symptôme de la sclérose latérale amyotrophique (SLA) ?", options: ["Perte de mémoire", "Faiblesse musculaire progressive", "Troubles visuels", "Troubles auditifs"], correct: 1, explanation: "La SLA est une maladie neurodégénérative touchant les motoneurones centraux (cortex moteur) et périphériques (corne antérieure, tronc cérébral). Elle provoque une faiblesse musculaire progressive, des fasciculations, une atrophie musculaire et finalement une insuffisance respiratoire. La survie médiane est de 3-5 ans.", ref: "Brown RH & Al-Chalabi A (2017). Amyotrophic lateral sclerosis. N Engl J Med." },
                    { question: "La maladie de Wilson est associée à une accumulation de quel métal ?", options: ["Fer", "Cuivre", "Zinc", "Aluminium"], correct: 1, explanation: "La maladie de Wilson est une maladie autosomique récessive due à une mutation du gène ATP7B, transporteur du cuivre. L'accumulation de cuivre dans le foie, le cerveau (ganglions de la base) et la cornée (anneau de Kayser-Fleischer) provoque cirrhose, troubles du mouvement et troubles psychiatriques.", ref: "Lishman WA (1998). Organic Psychiatry, 3e éd. Blackwell Science." },
                    { question: "Quel est le principal marqueur biologique de la maladie d'Alzheimer dans le LCR ?", options: ["Protéine Tau totale", "Bêta-amyloïde 42", "Alpha-synucléine", "Protéine S100B"], correct: 1, explanation: "Le profil biomarqueur LCR de la MA comprend : diminution de l'A-bêta-42 (séquestré dans les plaques), augmentation de la Tau totale (mort neuronale) et de la Tau phosphorylée (dégénérescences neurofibrillaires). Ce profil AT(N) permet un diagnostic biologique avant les symptômes cliniques.", ref: "Jack CR et al. (2018). NIA-AA Research Framework for Alzheimer\'s disease. Alzheimers Dement." },
                    { question: "Quel trouble est caractérisé par une négligence de l'espace controlatéral ?", options: ["Aphasie", "Syndrome de neglect spatial", "Apraxie", "Agnosie"], correct: 1, explanation: "Le syndrome de négligence spatiale unilatérale (NSU) survient après lésion pariétale droite. Le patient ignore spontanément l'espace gauche : il ne mange que la moitié droite de l'assiette, ne se rase que la joue droite. Il ne s'agit pas d'une cécité mais d'un trouble attentionnel spatial.", ref: "Mesulam MM (1981). A cortical network for directed attention. Ann Neurol." },
                    { question: "Quelle maladie est associée à une dégénérescence des neurones moteurs ?", options: ["Maladie de Parkinson", "Sclérose latérale amyotrophique (SLA)", "Maladie d'Alzheimer", "Maladie de Huntington"], correct: 1, explanation: "La SLA (sclérose latérale amyotrophique, maladie de Charcot) est caractérisée par la dégénérescence sélective des motoneurones supérieurs (cortex moteur) et inférieurs (moelle épinière, tronc cérébral), produisant une combinaison de signes pyramidaux et de paralysie flasque.", ref: "Lishman WA (1998). Organic Psychiatry, 3e éd. Blackwell Science." },
                    { question: "Quel est le principal symptôme de la maladie de Parkinson ?", options: ["Perte de mémoire", "Tremblements au repos", "Troubles visuels", "Troubles auditifs"], correct: 1, explanation: "Le tremblement de repos est le signe cardinal le plus visible de la MP : il est rythmique (4-6 Hz), présent au repos et disparaît lors du mouvement volontaire. Associé à la rigidité en roue dentée et à l'akinésie/bradykinésie, il forme la triade parkinsonienne classique.", ref: "Kalia LV & Lang AE (2015). Parkinson\'s disease. Lancet." },
                    { question: "Quelle maladie est associée à une accumulation de protéine alpha-synucléine ?", options: ["Maladie d'Alzheimer", "Maladie de Parkinson", "Maladie de Huntington", "Sclérose en plaques"], correct: 1, explanation: "L'alpha-synucléine mal repliée est le composant principal des corps de Lewy dans la maladie de Parkinson et la démence à corps de Lewy. Des mutations (A53T) ou des multiplications du gène SNCA causent des formes familiales. L'alpha-synucléine se propage de neurone en neurone de manière prion-like.", ref: "Kalia LV & Lang AE (2015). Parkinson\'s disease. Lancet." },
                    { question: "Quel syndrome est caractérisé par une incapacité à reconnaître les objets par le toucher ?", options: ["Agnosie visuelle", "Astéréognosie", "Apraxie", "Aphasie"], correct: 1, explanation: "L'astéréognosie (ou agnosie tactile) est l'incapacité à reconnaître des objets familiers par le toucher seul, malgré des capacités sensorielles intactes. Elle résulte d'une lésion du cortex pariétal somatosensoriel secondaire et reflète une rupture entre la perception tactile et la mémoire des formes.", ref: "Lishman WA (1998). Organic Psychiatry, 3e éd. Blackwell Science." },
                    { question: "Quelle maladie est associée à une démence rapide ?", options: ["Maladie d'Alzheimer", "Maladie de Creutzfeldt-Jakob", "Maladie de Parkinson", "Sclérose en plaques"], correct: 1, explanation: "La maladie de Creutzfeldt-Jakob (MCJ) est la principale cause de démence rapidement progressive : l'évolution de l'état cognitif normal à la mort se fait en quelques semaines à mois. Les signes caractéristiques incluent myoclonies, ataxie, EEG avec complexes périodiques et IRM avec hypersignal en diffusion.", ref: "Prusiner SB (1998). Prions. PNAS." },
                    { question: "Quel est le principal symptôme de la maladie de Huntington ?", options: ["Perte de mémoire", "Mouvements choréiques", "Troubles visuels", "Troubles auditifs"], correct: 1, explanation: "La chorée (du grec danse) est le signe moteur caractéristique de la MH : mouvements involontaires, irréguliers, imprévisibles, affectant le visage, les membres et le tronc. Elle résulte de la dégénérescence des neurones striataux GABAergiques désinhibant le thalamus moteur.", ref: "Ross CA & Tabrizi SJ (2011). Huntington\'s disease. Lancet Neurol." },
                    { question: "Quelle maladie est associée à une inflammation du système nerveux central ?", options: ["Maladie d'Alzheimer", "Sclérose en plaques", "Maladie de Parkinson", "Maladie de Huntington"], correct: 1, explanation: "La sclérose en plaques est une neuroinflammation chronique auto-immune médiée par des lymphocytes T CD4+ qui traversent la barrière hémato-encéphalique et attaquent la myéline. Le liquide céphalorachidien montre des bandes oligoclonales d'IgG et un index IgG élevé.", ref: "Compston A & Coles A (2008). Multiple sclerosis. Lancet." },
                    { question: "Quel syndrome est caractérisé par une répétition involontaire de mots ou de phrases entendus ?", options: ["Écholalie", "Palilalie", "Coprolalie", "Aphasie"], correct: 0, explanation: "L'écholalie est la répétition involontaire et stéréotypée des mots ou phrases de l'interlocuteur. Elle se distingue de la palilalie (répétition de ses propres mots) et de la coprolalie (mots obscènes). Elle témoigne d'une libération des circuits automatiques de la parole normalement inhibés.", ref: "Lishman WA (1998). Organic Psychiatry, 3e éd. Blackwell Science." },
                    { question: "Quelle maladie est associée à une dégénérescence des neurones du cervelet ?", options: ["Maladie d'Alzheimer", "Ataxie cérébelleuse", "Maladie de Parkinson", "Maladie de Huntington"], correct: 1, explanation: "Les ataxies cérébelleuses héréditaires (spinocérébelleuses, SCA) et acquises causent une dégénérescence progressive des neurones cérébelleux (cellules de Purkinje). Les symptômes incluent ataxie de la marche, dysmétrie, dysarthrie cérébelleuse (voix scandée) et nystagmus.", ref: "Klockgether T (2010). Sporadic ataxia with adult onset. Nat Rev Neurol." },
                    { question: "Quel est le principal symptôme de l'épilepsie ?", options: ["Tremblements", "Crises convulsives", "Perte de mémoire", "Troubles visuels"], correct: 1, explanation: "Les crises épileptiques résultent d'une décharge neuronale excessive et synchrone. Elles peuvent être focales (conscience préservée ou altérée) ou généralisées (tonico-cloniques, absences). Le diagnostic repose sur l'EEG (anomalies paroxystiques) et l'IRM pour identifier une cause structurelle.", ref: "Fisher RS et al. (2014). ILAE official report: a practical clinical definition of epilepsy. Epilepsia." }
                ],
                troubles_psychiatriques: [
                    { question: "Quel trouble psychiatrique est associé à un excès de dopamine ?", options: ["Dépression", "Schizophrénie", "Trouble bipolaire", "TOC"], correct: 1, explanation: "L'hypothèse dopaminergique de la schizophrénie postule une hyperactivité dopaminergique mésolimbique à l'origine des symptômes positifs (hallucinations, délires). Tous les antipsychotiques typiques et atypiques bloquent les récepteurs D2 : leur efficacité soutient cette hypothèse.", ref: "Stahl SM (2021). Stahl\'s Essential Psychopharmacology, 5e éd. Cambridge University Press." },
                    { question: "Quel neurotransmetteur est principalement impliqué dans la dépression ?", options: ["Dopamine", "Sérotonine", "GABA", "Acétylcholine"], correct: 1, explanation: "La dépression implique un dysfonctionnement sérotoninergique, noradrénergique et dopaminergique. L'hypothèse monoaminergique (déficit en 5-HT et NA) reste dominante cliniquement. Les ISRS, IRSN et antidépresseurs tricycliques ciblent ces systèmes. Le rôle de l'inflammation est de plus en plus reconnu.", ref: "Malhi GS & Mann JJ (2018). Depression. Lancet." },
                    { question: "Quel trouble est caractérisé par des pensées intrusives et des comportements répétitifs ?", options: ["Schizophrénie", "Trouble bipolaire", "TOC", "Dépression"], correct: 2, explanation: "Le TOC (Trouble Obsessionnel-Compulsif) se manifeste par des obsessions (pensées intrusives, ego-dystoniques) et des compulsions (rituels répétitifs visant à réduire l'anxiété). Il implique une hyperactivité du circuit orbito-fronto-striatal. Les ISRS à forte dose et la TCC-exposition sont les traitements de référence.", ref: "Stahl SM (2021). Stahl\'s Essential Psychopharmacology, 5e éd. Cambridge University Press." },
                    { question: "Quel trouble est associé à des épisodes maniaques et dépressifs ?", options: ["Schizophrénie", "Trouble bipolaire", "TOC", "Anxiété généralisée"], correct: 1, explanation: "Le trouble bipolaire (type I : épisodes maniaques francs ; type II : hypomanie) implique une dysrégulation des circuits monoaminergiques et des rythmes circadiens. Le lithium, stabilisateur de l'humeur, reste le traitement de référence depuis sa découverte par Cade en 1949.", ref: "Stahl SM (2021). Stahl\'s Essential Psychopharmacology, 5e éd. Cambridge University Press." },
                    { question: "Quel trouble est caractérisé par une hyperactivité et des difficultés à maintenir l'attention ?", options: ["Schizophrénie", "Trouble bipolaire", "TDAH", "TOC"], correct: 2, explanation: "Le TDAH touche 5-7% des enfants et 2-5% des adultes. Il implique un dysfonctionnement dopaminergique et noradrénergique préfrontal. Les stimulants (méthylphénidate, amphétamines) normalisent la dopamine préfrontale et améliorent les fonctions exécutives et l'attention.", ref: "Faraone SV et al. (2021). The World Federation of ADHD International Consensus Statement. Neurosci Biobehav Rev." },
                    { question: "Quel neurotransmetteur est ciblé par les antidépresseurs tricycliques ?", options: ["Dopamine", "Sérotonine et noradrénaline", "GABA", "Acétylcholine"], correct: 1, explanation: "Les tricycliques (amitriptyline, clomipramine) inhibent la recapture de la sérotonine ET de la noradrénaline (double action IRSN). Ils bloquent aussi les récepteurs histaminiques (sédation), muscariniques (effets anticholinergiques) et alpha-adrénergiques (hypotension orthostatique), d'où leurs nombreux effets indésirables.", ref: "Stahl SM (2021). Stahl\'s Essential Psychopharmacology, 5e éd. Cambridge University Press." },
                    { question: "Quel trouble est caractérisé par des hallucinations et des délires ?", options: ["Dépression", "Schizophrénie", "Trouble bipolaire", "TOC"], correct: 1, explanation: "La schizophrénie est caractérisée par des symptômes positifs (hallucinations auditives, délires persécutoires), négatifs (aboulie, apathie, alogie) et cognitifs (déficits des fonctions exécutives, mémoire de travail). Sa prévalence est de 1% et son étiologie est multifactorielle (génétique + environnement).", ref: "Stahl SM (2021). Stahl\'s Essential Psychopharmacology, 5e éd. Cambridge University Press." },
                    { question: "Quel trouble est associé à une anxiété excessive et persistante ?", options: ["Dépression", "Trouble anxieux généralisé", "Trouble bipolaire", "TOC"], correct: 1, explanation: "Le Trouble Anxieux Généralisé (TAG) se caractérise par une inquiétude excessive et incontrôlable pour de nombreux domaines de la vie, pendant plus de 6 mois. Il implique une hyperactivité amygdalienne et un déficit du contrôle préfrontal. Les ISRS/IRSN et la TCC sont les traitements de première ligne.", ref: "Stahl SM (2021). Stahl\'s Essential Psychopharmacology, 5e éd. Cambridge University Press." },
                    { question: "Quel neurotransmetteur est impliqué dans le trouble panique ?", options: ["Dopamine", "GABA", "Sérotonine", "Noradrénaline"], correct: 3, explanation: "La noradrénaline joue un rôle central dans le trouble panique via l'hyperactivité du locus coeruleus. La stimulation de cette structure produit des symptômes paniques (tachycardie, sudation, sensation de mort imminente). Les ISRS qui régulent indirectement le système noradrénergique sont efficaces.", ref: "Stahl SM (2021). Stahl\'s Essential Psychopharmacology, 5e éd. Cambridge University Press." },
                    { question: "Quel trouble est caractérisé par une peur intense et irrationnelle d'un objet ou d'une situation ?", options: ["Trouble bipolaire", "Phobie spécifique", "TOC", "Dépression"], correct: 1, explanation: "Les phobies spécifiques sont des peurs irrationnelles, disproportionnées et persistantes (animaux, sang, espaces, hauteurs). Elles impliquent une hyperactivité amygdalienne. La thérapie d'exposition (TCC) est le traitement de référence, avec d'excellents taux de rémission (plus de 80%).", ref: "Stahl SM (2021). Stahl\'s Essential Psychopharmacology, 5e éd. Cambridge University Press." },
                    { question: "Quel neurotransmetteur est impliqué dans le trouble de stress post-traumatique (TSPT) ?", options: ["Dopamine", "Noradrénaline", "Sérotonine", "GABA"], correct: 1, explanation: "Le TSPT implique une hyperactivité noradrénergique (hypervigilance, sursauts, cauchemars) et une dysrégulation de l'axe HPA (cortisol). La prazosine (antagoniste alpha-1 noradrénergique) réduit les cauchemars. Les ISRS et la thérapie EMDR sont les traitements validés.", ref: "Yehuda R et al. (2015). Post-traumatic stress disorder. Nat Rev Dis Primers." },
                    { question: "Quel trouble est caractérisé par une instabilité émotionnelle et des relations interpersonnelles chaotiques ?", options: ["Trouble bipolaire", "Trouble de la personnalité limite (borderline)", "TOC", "Schizophrénie"], correct: 1, explanation: "Le Trouble de la Personnalité Borderline (TPB) se caractérise par une instabilité affective intense, des relations chaotiques, une impulsivité, une identité instable et des comportements auto-destructeurs. La Thérapie Comportementale Dialectique (DBT) de Linehan est le traitement psychothérapeutique de référence.", ref: "Stahl SM (2021). Stahl\'s Essential Psychopharmacology, 5e éd. Cambridge University Press." },
                    { question: "Quel neurotransmetteur est impliqué dans l'anxiété sociale ?", options: ["Dopamine", "Sérotonine", "GABA", "Glutamate"], correct: 1, explanation: "L'anxiété sociale implique une hyperactivité sérotoninergique amygdalienne face aux stimuli sociaux menaçants. Les ISRS (paroxétine, sertraline) sont le traitement pharmacologique de première ligne. La dopamine est aussi impliquée : la peur du jugement social active les circuits de récompense/punition sociale.", ref: "Stahl SM (2021). Stahl\'s Essential Psychopharmacology, 5e éd. Cambridge University Press." },
                    { question: "Quel trouble est caractérisé par une méfiance excessive et une suspicion envers les autres ?", options: ["Trouble bipolaire", "Trouble de la personnalité paranoïaque", "TOC", "Dépression"], correct: 1, explanation: "Le Trouble de la Personnalité Paranoïaque se manifeste par une méfiance persistante et non justifiée, une tendance à interpréter les actions d'autrui comme menaçantes, des rancœurs prolongées et une remise en question constante de la fidélité des proches. Il diffère de la schizophrénie par l'absence de psychose franche.", ref: "Stahl SM (2021). Stahl\'s Essential Psychopharmacology, 5e éd. Cambridge University Press." },
                    { question: "Quel trouble est associé à des épisodes de dépersonnalisation ?", options: ["Trouble bipolaire", "Trouble de stress post-traumatique", "TOC", "Schizophrénie"], correct: 1, explanation: "Le TSPT peut s'accompagner d'épisodes de dépersonnalisation (sentiment d'être détaché de soi-même) et de déréalisation (sentiment d'irréalité du monde). Ces symptômes dissociatifs reflètent une inhibition amygdalienne par le cortex préfrontal médian en réponse à un traumatisme intolérable.", ref: "Stahl SM (2021). Stahl\'s Essential Psychopharmacology, 5e éd. Cambridge University Press." },
                    { question: "Quel neurotransmetteur est impliqué dans la régulation de l'humeur dans le trouble bipolaire ?", options: ["Dopamine", "Sérotonine", "GABA", "Noradrénaline"], correct: 1, explanation: "La sérotonine régule l'humeur dans le trouble bipolaire en interagissant avec les circuits dopaminergiques et noradrénergiques. Pendant la manie, les systèmes monoaminergiques sont hyperactifs ; pendant la dépression, hypoactifs. Le lithium stabilise ces oscillations via des mécanismes multiples (GSK-3bêta, inositol).", ref: "Goodwin GM et al. (2016). Evidence-based guidelines for bipolar disorder. J Psychopharmacol." },
                    { question: "Quel trouble est caractérisé par des comportements impulsifs et une instabilité émotionnelle ?", options: ["Trouble bipolaire", "Trouble de la personnalité limite", "TOC", "Schizophrénie"], correct: 1, explanation: "Le Trouble de la Personnalité Borderline (TPB) présente une impulsivité marquée (comportements à risque, auto-mutilations, dépenses excessives) associée à une instabilité émotionnelle intense. Les études de neuroimagerie montrent une hyperréactivité amygdalienne et un déficit de régulation préfrontale.", ref: "Stahl SM (2021). Stahl\'s Essential Psychopharmacology, 5e éd. Cambridge University Press." },
                    { question: "Quel trouble est associé à une altération de la perception de la réalité ?", options: ["Dépression", "Schizophrénie", "Trouble bipolaire", "TOC"], correct: 1, explanation: "La schizophrénie est le trouble psychotique par excellence, caractérisé par une perte du contact avec la réalité : hallucinations (souvent auditives), délires (persécution, grandiosité), désorganisation de la pensée et du comportement. Elle débute typiquement entre 15-25 ans et nécessite un traitement antipsychotique.", ref: "Stahl SM (2021). Stahl\'s Essential Psychopharmacology, 5e éd. Cambridge University Press." },
                    { question: "Quel neurotransmetteur est impliqué dans la régulation du sommeil dans la dépression ?", options: ["Dopamine", "Sérotonine", "GABA", "Noradrénaline"], correct: 1, explanation: "La sérotonine joue un rôle clé dans les troubles du sommeil associés à la dépression : insomnie d'endormissement, réveils nocturnes et diminution du sommeil lent profond. La dépression réduit aussi la latence du sommeil paradoxal (REM). Les antidépresseurs normalisent progressivement l'architecture du sommeil.", ref: "Malhi GS & Mann JJ (2018). Depression. Lancet." },
                    { question: "Quel trouble est caractérisé par une obsession des symétries et des rituels ?", options: ["Trouble bipolaire", "TOC", "Schizophrénie", "Dépression"], correct: 1, explanation: "Le TOC peut se présenter sous forme de contamination, symétrie/ordre, accumulation ou pensées interdites. Le sous-type symétrie implique une hyperactivité du noyau caudé. La TCC avec exposition et prévention de la réponse (ERP) est efficace dans 60-70% des cas.", ref: "Saxena S & Rauch SL (2000). Functional neuroimaging in OCD. Psychiatr Clin North Am." }
                ],
                neurodeveloppement: [
                    { question: "Quel trouble du neurodéveloppement est caractérisé par des difficultés sociales et des comportements répétitifs ?", options: ["TDAH", "Autisme", "Dyslexie", "Dyspraxie"], correct: 1, explanation: "L'autisme (TSA, Trouble du Spectre de l'Autisme) se caractérise par des difficultés persistantes dans la communication sociale et des comportements restreints et répétitifs. Sa prévalence est d'environ 1/54. Les facteurs génétiques sont prédominants (héritabilité supérieure à 80%), avec des centaines de gènes impliqués.", ref: "Johnson MH (2011). Developmental Cognitive Neuroscience, 3e éd. Wiley-Blackwell." },
                    { question: "Quel trouble est associé à des difficultés de lecture et d'orthographe ?", options: ["TDAH", "Autisme", "Dyslexie", "Dyspraxie"], correct: 2, explanation: "La dyslexie développementale touche 5-10% de la population et résulte principalement d'un déficit phonologique (difficulté à manipuler les phonèmes). Elle implique un dysfonctionnement des circuits temporaux gauches (voie phonologique) et pariéto-occipitaux (voie orthographique). La rééducation précoce améliore significativement le pronostic.", ref: "Dehaene S (2007). Les neurones de la lecture. Odile Jacob." },
                    { question: "Quel trouble est caractérisé par des difficultés de coordination motrice ?", options: ["TDAH", "Autisme", "Dyslexie", "Dyspraxie"], correct: 3, explanation: "Le Trouble Développemental de la Coordination (TDC, anciennement dyspraxie) se manifeste par des difficultés motrices significatives (maladresse, lenteur) affectant les activités quotidiennes et scolaires. Il implique des circuits cérébello-pariétaux et le réseau de planification motrice préfrontale.", ref: "Johnson MH (2011). Developmental Cognitive Neuroscience, 3e éd. Wiley-Blackwell." },
                    { question: "Quel trouble du neurodéveloppement est souvent associé à une hyperactivité ?", options: ["Autisme", "TDAH", "Dyslexie", "Dyspraxie"], correct: 1, explanation: "Le TDAH est le trouble neurodéveloppemental le plus fréquent (5-7% des enfants). Il se présente en trois types : inattentif, hyperactif-impulsif, et combiné. L'imagerie montre un retard de maturation corticale de 2-3 ans, particulièrement dans les régions préfrontales.", ref: "Faraone SV et al. (2021). The World Federation of ADHD International Consensus Statement. Neurosci Biobehav Rev." },
                    { question: "Quel trouble est caractérisé par des difficultés à comprendre les émotions des autres ?", options: ["TDAH", "Autisme", "Dyslexie", "Dyspraxie"], correct: 1, explanation: "L'autisme (TSA) se caractérise par des difficultés dans la cognition sociale, notamment la compréhension des émotions et des états mentaux d'autrui (théorie de l'esprit déficitaire). Les études de neuroimagerie montrent une hypoactivation de la jonction temporo-pariétale et du sillon temporal supérieur.", ref: "Johnson MH (2011). Developmental Cognitive Neuroscience, 3e éd. Wiley-Blackwell." },
                    { question: "Quel trouble est associé à des difficultés d'attention et d'impulsivité ?", options: ["Autisme", "TDAH", "Dyslexie", "Dyspraxie"], correct: 1, explanation: "Le TDAH type combiné associe inattention, hyperactivité et impulsivité. L'impulsivité résulte d'un déficit du contrôle inhibiteur préfrontal dopaminergique. Elle se manifeste par des réponses prématurées, des difficultés à attendre son tour et des décisions sans réflexion préalable.", ref: "Johnson MH (2011). Developmental Cognitive Neuroscience, 3e éd. Wiley-Blackwell." },
                    { question: "Quel trouble est caractérisé par des difficultés à écrire de manière lisible ?", options: ["Autisme", "TDAH", "Dysgraphie", "Dyspraxie"], correct: 2, explanation: "La dysgraphie développementale est un trouble de l'acquisition de l'écriture. Elle peut être motrice (mauvaise tenue du crayon, tracé irrégulier) ou phonologique (orthographe). Elle est souvent associée à la dyslexie et/ou au TDC. Une rééducation graphomotrice avec ergothérapeute est recommandée.", ref: "Johnson MH (2011). Developmental Cognitive Neuroscience, 3e éd. Wiley-Blackwell." },
                    { question: "Quel trouble est caractérisé par des difficultés à comprendre les expressions faciales ?", options: ["Autisme", "TDAH", "Dyslexie", "Dyspraxie"], correct: 0, explanation: "L'autisme (TSA) présente des difficultés à reconnaître et interpréter les expressions faciales émotionnelles. Les études par eye-tracking montrent que les personnes autistes explorent différemment les visages (moins d'attention aux yeux). La FFA (Fusiform Face Area) montre une activation atypique dans le TSA.", ref: "Johnson MH (2011). Developmental Cognitive Neuroscience, 3e éd. Wiley-Blackwell." },
                    { question: "Quel trouble est associé à des difficultés à suivre des instructions complexes ?", options: ["Autisme", "TDAH", "Dyslexie", "Dyspraxie"], correct: 1, explanation: "Le TDAH, en raison des déficits de mémoire de travail et d'attention soutenue, rend difficile le suivi d'instructions complexes et séquentielles. Les enfants TDAH semblent ne pas écouter, mais leur problème est la rétention et l'organisation des informations reçues, pas la compréhension elle-même.", ref: "Johnson MH (2011). Developmental Cognitive Neuroscience, 3e éd. Wiley-Blackwell." },
                    { question: "Quel trouble est caractérisé par des difficultés à organiser des tâches ?", options: ["Autisme", "TDAH", "Dyslexie", "Dyspraxie"], correct: 1, explanation: "Le TDAH se manifeste par des difficultés d'organisation exécutive : planifier les étapes d'une tâche, gérer le temps, prioriser les activités et initier les tâches non stimulantes. Ces déficits reflètent un dysfonctionnement du cortex préfrontal dorsolatéral et des connexions striato-frontales.", ref: "Johnson MH (2011). Developmental Cognitive Neuroscience, 3e éd. Wiley-Blackwell." },
                    { question: "Quel trouble est associé à des difficultés de planification ?", options: ["Autisme", "TDAH", "Dyslexie", "Dyspraxie"], correct: 1, explanation: "Le TDAH présente des déficits de planification liés au dysfonctionnement exécutif préfrontal. Ces difficultés se manifestent dans la vie quotidienne (projets scolaires, organisation du cartable) et sont objectivées par la Tour de Londres et les tests de planning.", ref: "Johnson MH (2011). Developmental Cognitive Neuroscience, 3e éd. Wiley-Blackwell." },
                    { question: "Quel trouble est caractérisé par une hypersensibilité sensorielle ?", options: ["Autisme", "TDAH", "Dyslexie", "Dyspraxie"], correct: 0, explanation: "L'autisme (TSA) présente fréquemment des particularités sensorielles : hypersensibilité (aux sons, textures, lumières) ou hyposensibilité à certains stimuli. Ces profils sensoriels atypiques reflètent une modulation sensorielle anormale et peuvent causer une détresse significative dans les environnements ordinaires.", ref: "Johnson MH (2011). Developmental Cognitive Neuroscience, 3e éd. Wiley-Blackwell." },
                    { question: "Quel trouble est associé à des difficultés de communication non verbale ?", options: ["Autisme", "TDAH", "Dyslexie", "Dyspraxie"], correct: 0, explanation: "L'autisme (TSA) se caractérise par des difficultés dans les aspects non verbaux de la communication : contact visuel réduit, expressions faciales limitées, gestes peu fonctionnels et difficultés à interpréter la gestuelle et la prosodie d'autrui. Ces déficits reflètent une atypie du traitement social.", ref: "Johnson MH (2011). Developmental Cognitive Neuroscience, 3e éd. Wiley-Blackwell." },
                    { question: "Quel trouble est caractérisé par des intérêts très spécifiques et répétitifs ?", options: ["Autisme", "TDAH", "Dyslexie", "Dyspraxie"], correct: 0, explanation: "L'autisme (TSA) présente souvent des intérêts restreints et intensément focalisés (trains, dinosaures, chiffres...) qui peuvent atteindre un niveau encyclopédique. Ces intérêts, bien que socialement atypiques, peuvent devenir des forces et des vecteurs de socialisation et d'insertion professionnelle.", ref: "Johnson MH (2011). Developmental Cognitive Neuroscience, 3e éd. Wiley-Blackwell." },
                    { question: "Quel trouble est associé à des difficultés de motricité fine ?", options: ["Autisme", "TDAH", "Dyslexie", "Dyspraxie"], correct: 3, explanation: "La dyspraxie (TDC) affecte la motricité fine : tenue du crayon maladroite, difficultés avec les boutons et lacets, mauvaise coordination main-œil. Elle résulte d'un déficit dans la planification et l'exécution des séquences motrices fines, impliquant les circuits cérébelleux et pariétaux.", ref: "Johnson MH (2011). Developmental Cognitive Neuroscience, 3e éd. Wiley-Blackwell." },
                    { question: "Quel trouble est caractérisé par des difficultés à adapter son comportement ?", options: ["Autisme", "TDAH", "Dyslexie", "Dyspraxie"], correct: 0, explanation: "L'autisme (TSA) présente des difficultés de flexibilité comportementale : résistance aux changements, adhérence aux routines et rituels. Ces rigidités reflètent une inflexibilité cognitive (déficits de flexibilité au WCST) et une préférence pour la prévisibilité liée à un traitement atypique de l'incertitude.", ref: "Johnson MH (2011). Developmental Cognitive Neuroscience, 3e éd. Wiley-Blackwell." },
                    { question: "Quel trouble est associé à des retards de langage ?", options: ["Autisme", "TDAH", "Dyslexie", "Dyspraxie"], correct: 0, explanation: "L'autisme (TSA) peut s'accompagner de retards de langage variables : certains enfants TSA ne développent pas de langage fonctionnel (TSA non verbal), d'autres présentent un développement typique du langage mais avec des particularités pragmatiques (tour de parole, prosodie, humour).", ref: "Johnson MH (2011). Developmental Cognitive Neuroscience, 3e éd. Wiley-Blackwell." },
                    { question: "Quel trouble est caractérisé par des difficultés à imiter les gestes ?", options: ["Autisme", "TDAH", "Dyslexie", "Dyspraxie"], correct: 3, explanation: "La dyspraxie (TDC) se manifeste notamment par des difficultés à imiter des gestes sur démonstration (apraxie idéomotrice développementale). Cette difficulté reflète un déficit des représentations internes des séquences motrices (schémas moteurs) qui guident normalement l'imitation gestuelle.", ref: "Johnson MH (2011). Developmental Cognitive Neuroscience, 3e éd. Wiley-Blackwell." },
                    { question: "Quel trouble est associé à des difficultés de coordination œil-main ?", options: ["Autisme", "TDAH", "Dyslexie", "Dyspraxie"], correct: 3, explanation: "La dyspraxie (TDC) affecte la coordination visuo-motrice : attraper une balle, enfiler une perle, écrire en ligne droite. Ces difficultés résultent d'un déficit dans l'intégration des informations visuelles et proprioceptives pour guider les mouvements, impliquant les circuits pariéto-cérébelleux.", ref: "Johnson MH (2011). Developmental Cognitive Neuroscience, 3e éd. Wiley-Blackwell." },
                    { question: "Quel trouble est caractérisé par une difficulté à comprendre les métaphores ?", options: ["Autisme", "TDAH", "Dyslexie", "Dyspraxie"], correct: 0, explanation: "L'autisme (TSA) présente souvent des difficultés avec le langage figuré (métaphores, ironie, humour) en raison d'une tendance à l'interprétation littérale. Ceci reflète des déficits de pragmatique linguistique et de théorie de l'esprit : comprendre les métaphores nécessite d'inférer l'intention communicative de l'interlocuteur.", ref: "Johnson MH (2011). Developmental Cognitive Neuroscience, 3e éd. Wiley-Blackwell." }
                ],
                neuroimagerie: [
                    { question: "Quelle technique d'imagerie cérébrale utilise des champs magnétiques ?", options: ["TDM (Tomodensitométrie)", "IRM (Imagerie par Résonance Magnétique)", "TEP (Tomographie par Émission de Positrons)", "EEG (Électroencéphalographie)"], correct: 1, explanation: "L'IRM exploite l'alignement des protons d'hydrogène sous un champ magnétique intense (1,5 à 7 Tesla) et leur retour à l'équilibre après une impulsion radiofréquence. Le signal émis permet de reconstruire des images de haute résolution anatomique sans rayonnements ionisants.", ref: "Huettel SA et al. (2014). Functional Magnetic Resonance Imaging, 3e éd. Sinauer Associates." },
                    { question: "Quelle technique d'imagerie cérébrale mesure l'activité métabolique ?", options: ["TDM", "IRM", "TEP", "EEG"], correct: 2, explanation: "La TEP (Tomographie par Émission de Positrons) injecte un traceur radioactif (FDG, analogue du glucose marqué au F18) qui s'accumule dans les zones d'activité métabolique élevée. La désintégration des positrons génère des photons détectés pour reconstruire la carte d'activité métabolique cérébrale.", ref: "Huettel SA et al. (2014). Functional Magnetic Resonance Imaging, 3e éd. Sinauer Associates." },
                    { question: "Quelle technique d'imagerie cérébrale est utilisée pour détecter les anomalies structurelles cérébrales avec la meilleure résolution ?", options: ["EEG", "IRM", "TEP", "TDM"], correct: 1, explanation: "L'IRM offre la meilleure résolution spatiale pour les anomalies structurelles cérébrales (tumeurs, malformations, lésions de SEP, AVC sous-corticaux). Les séquences T1 révèlent l'anatomie, T2/FLAIR les oedèmes et lésions, T2* les saignements. Sa résolution millimétrique surpasse largement la TDM pour le tissu cérébral.", ref: "Toga AW & Mazziotta JC (2002). Brain Mapping: The Methods, 2e éd. Academic Press." },
                    { question: "Quelle technique d'imagerie cérébrale mesure l'activité électrique du cerveau ?", options: ["IRM", "TEP", "EEG", "TDM"], correct: 2, explanation: "L'EEG (électroencéphalographie) enregistre les potentiels électriques de surface générés par les courants post-synaptiques des neurones corticaux via des électrodes cutanées. Sa résolution temporelle (millisecondes) est unique mais sa résolution spatiale est limitée. Il est irremplaçable pour diagnostiquer l'épilepsie.", ref: "Huettel SA et al. (2014). Functional Magnetic Resonance Imaging, 3e éd. Sinauer Associates." },
                    { question: "Quelle technique d'imagerie cérébrale est utilisée pour étudier la connectivité fonctionnelle ?", options: ["IRM fonctionnelle (IRMf)", "TDM", "TEP", "EEG"], correct: 0, explanation: "L'IRMf de repos mesure les fluctuations spontanées du signal BOLD (Blood Oxygen Level Dependent) pour identifier les réseaux cérébraux fonctionnellement connectés. Elle révèle des réseaux cohérents au repos (DMN, réseau frontopariétal, réseau moteur) sans aucune tâche comportementale.", ref: "Biswal B et al. (1995). Functional connectivity in the motor cortex of resting human brain. Magn Reson Med." },
                    { question: "Quelle technique d'imagerie cérébrale utilise des traceurs radioactifs ?", options: ["IRM", "TEP", "EEG", "TDM"], correct: 1, explanation: "La TEP utilise des radiotraceurs émetteurs de positrons (F18-FDG pour le métabolisme, C11-PIB pour l'amyloïde, raclopride pour les récepteurs D2). Le demi-vie court des isotopes nécessite un cyclotron proche. La TEP amyloïde permet de détecter la maladie d'Alzheimer avant les symptômes cliniques.", ref: "Phelps ME (2000). PET: The merging of biology and imaging into molecular imaging. J Nucl Med." },
                    { question: "Quelle technique d'imagerie cérébrale est utilisée pour étudier les vaisseaux sanguins ?", options: ["IRM", "Angiographie", "TEP", "EEG"], correct: 1, explanation: "L'angiographie par IRM (ARM) utilise soit des techniques sans injection (temps de vol, TOF) soit avec injection de gadolinium pour visualiser l'architecture vasculaire cérébrale et détecter anévrismes, malformations artério-veineuses et sténoses artérielles intracrâniennes.", ref: "Huettel SA et al. (2014). Functional Magnetic Resonance Imaging, 3e éd. Sinauer Associates." },
                    { question: "Quelle technique d'imagerie cérébrale est utilisée pour détecter les lésions cérébrales aiguës ?", options: ["IRM", "TDM", "TEP", "EEG"], correct: 1, explanation: "La TDM (scanner) est la technique de première intention en urgence pour détecter les hémorragies intracrâniennes (hyperdenses en aigu), les fractures crâniennes et les AVC ischémiques. Sa rapidité (moins de 5 minutes) et sa disponibilité en font l'outil de triage neurologique d'urgence.", ref: "Huettel SA et al. (2014). Functional Magnetic Resonance Imaging, 3e éd. Sinauer Associates." },
                    { question: "Quelle technique d'imagerie cérébrale est utilisée pour étudier la perfusion cérébrale ?", options: ["IRM", "TEP", "SPECT", "EEG"], correct: 2, explanation: "La SPECT (Single Photon Emission Computed Tomography) et l'IRM de perfusion (ASL, Dynamic Susceptibility Contrast) mesurent le débit sanguin cérébral régional. La SPECT avec Tc-HMPAO est utilisée en épilepsie (ictale vs interictale) et dans le diagnostic différentiel des démences.", ref: "Alsop DC et al. (2015). Recommended implementation of arterial spin-labeled perfusion MRI. Magn Reson Med." },
                    { question: "Quelle technique d'imagerie cérébrale offre la meilleure résolution temporelle pour étudier l'activité cérébrale en temps réel ?", options: ["IRMf", "TDM", "TEP", "EEG"], correct: 3, explanation: "L'EEG offre une résolution temporelle de l'ordre de la milliseconde, permettant d'étudier l'activité cérébrale en temps réel. Les potentiels évoqués (N400, P300, N200) capturent des processus cognitifs précis avec une précision temporelle inaccessible à l'IRMf (délai hémodynamique de 4-6 secondes).", ref: "Luck SJ. (2014). An Introduction to the Event-Related Potential Technique, 2e éd. MIT Press." },
                    { question: "Quelle technique d'imagerie cérébrale est utilisée pour étudier les lésions de la substance blanche ?", options: ["IRM", "TDM", "TEP", "EEG"], correct: 0, explanation: "L'IRM de diffusion (DTI, Diffusion Tensor Imaging) mesure la diffusion anisotrope des molécules d'eau dans les faisceaux de substance blanche. La tractographie DTI reconstitue virtuellement les faisceaux (fascicule arqué, corps calleux) et détecte leurs lésions dans la SEP, les TCC et les leucoencéphalopathies.", ref: "Mori S & Zhang J (2006). Principles of diffusion tensor imaging. Neuron." },
                    { question: "Quelle technique d'imagerie cérébrale est utilisée pour étudier les crises d'épilepsie ?", options: ["IRM", "TDM", "EEG", "TEP"], correct: 2, explanation: "L'EEG reste l'examen de référence pour diagnostiquer l'épilepsie : il détecte les anomalies paroxystiques intercritiques (pointes, pointe-ondes) et enregistre les crises (EEG-vidéo). La SPECT ictale et l'IRMf EEG-corrélée complètent le bilan pré-chirurgical pour localiser la zone épileptogène.", ref: "Huettel SA et al. (2014). Functional Magnetic Resonance Imaging, 3e éd. Sinauer Associates." },
                    { question: "Quelle technique d'imagerie cérébrale est utilisée pour étudier le métabolisme du glucose ?", options: ["IRM", "TEP", "EEG", "TDM"], correct: 1, explanation: "La TEP au FDG (Fluorodésoxyglucose marqué au F18) mesure la consommation de glucose cérébrale région par région. Elle détecte l'hypométabolisme caractéristique de la maladie d'Alzheimer (temporal et pariétal) et de la DFT (frontal), permettant un diagnostic différentiel des démences.", ref: "Phelps ME (2000). PET: The merging of biology and imaging into molecular imaging. J Nucl Med." },
                    { question: "Quelle technique d'imagerie cérébrale est utilisée pour étudier les lésions vasculaires ?", options: ["IRM", "Angiographie par IRM", "TEP", "EEG"], correct: 1, explanation: "L'angiographie par IRM (ARM) et l'angiographie par TDM (angio-TDM) visualisent les lésions vasculaires intracrâniennes. L'angiographie conventionnelle (DSA) reste la référence pour les petits anévrismes et les MAV. L'IRM séquences FLAIR et T2* détecte les leucoaraïose et les microsaignements.", ref: "Wardlaw JM et al. (2013). Neuroimaging standards for research into small vessel disease. Lancet Neurol." },
                    { question: "Quelle technique d'imagerie cérébrale est utilisée pour étudier les lésions de la moelle épinière ?", options: ["IRM", "TDM", "TEP", "EEG"], correct: 0, explanation: "L'IRM est la technique de référence pour explorer la moelle épinière : elle visualise les compressions médullaires (hernie discale, tumeur), les lésions intramédullaires (SEP, myélite, syringomyélie) en haute résolution. Les séquences sagittales T2 et axiales T1 sont les plus informatives.", ref: "Filippi M et al. (2018). MRI criteria for the diagnosis of multiple sclerosis. Lancet Neurol." },
                    { question: "Quelle technique d'imagerie cérébrale est utilisée pour étudier les lésions des nerfs périphériques ?", options: ["IRM", "TDM", "Électromyographie", "EEG"], correct: 2, explanation: "L'électromyographie (EMG) et les études de conduction nerveuse (ENMG) évaluent l'intégrité des nerfs périphériques et des muscles. L'EMG détecte les dénervations, les myopathies et les neuropathies. L'IRM des nerfs (neurographie) permet une visualisation directe des nerfs périphériques atteints.", ref: "Preston DC & Shapiro BE (2012). Electromyography and Neuromuscular Disorders, 3e éd. Elsevier." },
                    { question: "Quelle technique d'imagerie cérébrale est utilisée pour étudier les lésions du tronc cérébral ?", options: ["IRM", "TDM", "TEP", "EEG"], correct: 0, explanation: "L'IRM est supérieure à la TDM pour l'exploration du tronc cérébral grâce à l'absence d'artéfacts osseux. Les séquences FLAIR, T2 et la diffusion détectent les infarctus, tumeurs et lésions de SEP dans cette région. L'IRM 3T offre une résolution suffisante pour visualiser les petits noyaux des nerfs crâniens.", ref: "Duus P (2005). Topical Diagnosis in Neurology, 4e éd. Thieme." },
                    { question: "Quelle technique d'imagerie cérébrale est utilisée pour étudier les lésions des ganglions de la base ?", options: ["IRM", "TDM", "TEP", "EEG"], correct: 0, explanation: "L'IRM est la technique de choix pour explorer les ganglions de la base. Les séquences T2, FLAIR et T2* détectent les lésions vasculaires lacunaires, les dépôts de fer (syndromes NBIA), les calcifications et les modifications de signal dans les maladies dégénératives (Wilson, Huntington, Parkinson).", ref: "Albin RL et al. (1989). The functional anatomy of basal ganglia disorders. Trends Neurosci." },
                    { question: "Quelle technique d'imagerie cérébrale est utilisée pour étudier les lésions du cortex cérébral ?", options: ["IRM", "TDM", "TEP", "EEG"], correct: 0, explanation: "L'IRM structurale (3D T1, FLAIR) est la technique de référence pour les lésions corticales : atrophie focale (démences), dysplasies corticales (épilepsie), contusions corticales (traumatismes), encéphalites. La morphométrie voxelwise (VBM) compare les volumes de substance grise entre groupes.", ref: "Toga AW & Mazziotta JC (2002). Brain Mapping: The Methods, 2e éd. Academic Press." },
                    { question: "Quelle technique d'imagerie cérébrale est utilisée pour étudier les lésions du cervelet ?", options: ["IRM", "TDM", "TEP", "EEG"], correct: 0, explanation: "L'IRM est indispensable pour explorer le cervelet : atrophie (ataxies héréditaires, alcoolisme), infarctus cérébelleux (PICA, AICA), tumeurs (médulloblastome, hémangioblastome) et lésions de SEP. La fosse postérieure est mal visualisée en TDM (artéfacts osseux), mais parfaitement en IRM.", ref: "Huettel SA et al. (2014). Functional Magnetic Resonance Imaging, 3e éd. Sinauer Associates." }
                ]
            ,
                emotions_cognition_sociale: [
                    { question: "Quelle structure cérébrale joue un rôle central dans la reconnaissance des expressions faciales émotionnelles ?", options: ["Hippocampe", "Amygdale", "Cortex préfrontal ventromédian", "Cervelet"], correct: 1, explanation: "L'amygdale est essentielle à la détection et à l'évaluation des stimuli émotionnels, en particulier la peur et les expressions faciales menaçantes. Des lésions bilatérales abolissent la reconnaissance de la peur.", ref: "Adolphs R. (2002). Neural systems for recognizing emotion. Curr Opin Neurobiol." },
                    { question: "La théorie de l'esprit (ToM) est principalement associée à quelle région cérébrale ?", options: ["Cortex moteur primaire", "Jonction temporo-pariétale (TPJ)", "Cervelet", "Cortex visuel"], correct: 1, explanation: "La jonction temporo-pariétale (TPJ) est systématiquement activée lors des tâches de mentalisation. Elle permet d'attribuer des états mentaux à autrui, processus déficitaire dans l'autisme.", ref: "Saxe R & Kanwisher N. (2003). People thinking about thinking people. NeuroImage." },
                    { question: "Quel neurotransmetteur est principalement impliqué dans le lien social et la confiance interpersonnelle ?", options: ["Dopamine", "Sérotonine", "Ocytocine", "Noradrénaline"], correct: 2, explanation: "L'ocytocine, libérée par l'hypothalamus, favorise les comportements d'attachement, la confiance et la coopération sociale. Son administration intranasale augmente la confiance dans les jeux économiques.", ref: "Kosfeld M et al. (2005). Oxytocin increases trust in humans. Nature." },
                    { question: "La régulation émotionnelle par réévaluation cognitive (reappraisal) implique principalement quel circuit ?", options: ["Amygdale → hippocampe", "Cortex préfrontal → amygdale (top-down)", "Thalamus → cortex sensoriel", "Cervelet → cortex moteur"], correct: 1, explanation: "La réévaluation cognitive mobilise le cortex préfrontal latéral et médian qui exerce un contrôle descendant (top-down) sur l'amygdale, réduisant la réactivité émotionnelle.", ref: "Ochsner KN & Gross JJ. (2005). The cognitive control of emotion. Trends Cogn Sci." },
                    { question: "Quel test évalue classiquement la théorie de l'esprit de premier ordre chez l'enfant ?", options: ["Test de Stroop", "Test de la fausse croyance (Sally-Anne)", "Test du Wisconsin", "Tour de Londres"], correct: 1, explanation: "Le test de Sally-Anne évalue si l'enfant comprend qu'une autre personne peut avoir une croyance fausse sur la réalité. Il est maîtrisé vers 4 ans chez les enfants neurotypiques, souvent déficitaire dans l'autisme.", ref: "Baron-Cohen S, Leslie AM & Frith U. (1985). Does the autistic child have a theory of mind? Cognition." },
                    { question: "L'alexithymie se définit comme :", options: ["Une incapacité à reconnaître les visages", "Une difficulté à identifier et décrire ses propres émotions", "Un trouble de la mémoire émotionnelle", "Une hyperréactivité de l'amygdale"], correct: 1, explanation: "L'alexithymie est caractérisée par une difficulté à identifier, différencier et verbaliser ses états émotionnels internes. Elle est associée aux troubles psychosomatiques et à l'autisme.", ref: "Taylor GJ, Bagby RM & Parker JDA. (1997). Disorders of Affect Regulation. Cambridge University Press." },
                    { question: "Quelle aire est spécifiquement activée lors de la perception de visages humains ?", options: ["Aire fusiforme des visages (FFA)", "Cortex auditif primaire", "Gyrus angulaire", "Cortex préfrontal dorsolatéral"], correct: 0, explanation: "La Fusiform Face Area (FFA), située dans le gyrus fusiforme temporal, répond de façon préférentielle aux visages humains. Sa lésion provoque la prosopagnosie (incapacité à reconnaître les visages).", ref: "Kanwisher N, McDermott J & Chun MM. (1997). The fusiform face area. J Neurosci." },
                    { question: "Le marqueur somatique de Damasio stipule que :", options: ["Les émotions n'ont aucun rôle dans la prise de décision", "Les signaux corporels émotionnels guident la prise de décision", "La mémoire de travail seule suffit à décider", "Le cortex préfrontal dorsolatéral est le siège des émotions"], correct: 1, explanation: "La théorie du marqueur somatique (Damasio) postule que des signaux corporels associés à des expériences passées orientent les décisions en signalant les options avantageuses ou dangereuses, avant tout raisonnement conscient.", ref: "Damasio AR. (1994). Descartes' Error: Emotion, Reason, and the Human Brain. Putnam." },
                    { question: "La contagion émotionnelle (emotional contagion) est principalement sous-tendue par :", options: ["Le système des neurones miroirs", "Le cortex préfrontal dorsolatéral", "L'hippocampe", "Le cervelet"], correct: 0, explanation: "Le système des neurones miroirs, découvert chez le macaque puis inféré chez l'humain, permet de résonner avec les états émotionnels d'autrui en activant les mêmes représentations que lors de l'expérience directe.", ref: "Rizzolatti G & Craighero L. (2004). The mirror-neuron system. Annu Rev Neurosci." },
                    { question: "Le cortex cingulaire antérieur (CCA) joue quel rôle dans le traitement social ?", options: ["Reconnaissance des couleurs", "Détection de l'exclusion sociale et de la douleur sociale", "Contrôle moteur fin", "Mémoire procédurale"], correct: 1, explanation: "Le CCA est activé lors de l'exclusion sociale (cyberball), de l'empathie pour la douleur d'autrui, et de la détection de conflits sociaux. La douleur sociale et physique partagent des substrats neuronaux communs.", ref: "Eisenberger NI, Lieberman MD & Williams KD. (2003). Does rejection hurt? Science." },
                    { question: "Quelle structure est impliquée dans le traitement de la récompense sociale (approbation d'autrui) ?", options: ["Cervelet", "Noyau accumbens et cortex préfrontal ventromédian", "Cortex visuel primaire", "Thalamus ventrolatéral"], correct: 1, explanation: "Le système de récompense (noyau accumbens, CPFvm) s'active lors de l'approbation sociale, montrant que les récompenses sociales mobilisent les mêmes circuits que les récompenses primaires (nourriture, argent).", ref: "Izuma K, Saito DN & Sadato N. (2008). Processing of social and monetary rewards in the human striatum. Neuron." },
                    { question: "La prosopagnosie acquise résulte typiquement d'une lésion de :", options: ["Cortex préfrontal dorsolatéral", "Gyrus fusiforme bilatéral (ou droit dominant)", "Hippocampe", "Cervelet"], correct: 1, explanation: "La prosopagnosie (incapacité à reconnaître les visages familiers) résulte généralement de lésions du gyrus fusiforme temporal droit ou bilatéral, particulièrement la Fusiform Face Area (FFA).", ref: "Damasio AR, Damasio H & Van Hoesen GW. (1982). Prosopagnosia: anatomic basis and behavioral mechanisms. Neurology." },
                    { question: "L'empathie affective se distingue de l'empathie cognitive car elle implique :", options: ["Uniquement le raisonnement sur les états mentaux d'autrui", "Un partage émotionnel viscéral avec activation des régions insulaires et cingulaires", "Exclusivement le cortex préfrontal gauche", "La mémoire sémantique des règles sociales"], correct: 1, explanation: "L'empathie affective (partager la douleur/joie d'autrui) implique l'insula antérieure et le cortex cingulaire antérieur. L'empathie cognitive (comprendre les états mentaux) implique plutôt la TPJ et le cortex médian préfrontal.", ref: "Singer T & Lamm C. (2009). The social neuroscience of empathy. Ann NY Acad Sci." },
                    { question: "Quel modèle théorique décrit six émotions de base universelles ?", options: ["Théorie des deux facteurs de Schachter-Singer", "Théorie des émotions de base d'Ekman", "Théorie du marqueur somatique de Damasio", "Théorie polyvagale de Porges"], correct: 1, explanation: "Paul Ekman a identifié six émotions de base (joie, tristesse, peur, colère, dégoût, surprise) exprimées par des expressions faciales universelles reconnues cross-culturellement, bien que cette universalité soit aujourd'hui nuancée.", ref: "Ekman P. (1992). An argument for basic emotions. Cogn Emot." },
                    { question: "Le cortex orbitofrontal (COF) est particulièrement impliqué dans :", options: ["Le contrôle moteur fin", "L'intégration des valeurs émotionnelles dans la prise de décision sociale", "La mémoire épisodique à long terme", "Le traitement auditif primaire"], correct: 1, explanation: "Le COF intègre les informations émotionnelles et de récompense pour guider les décisions sociales. Ses lésions (comme chez Phineas Gage) entraînent des comportements socialement inappropriés malgré un QI intact.", ref: "Bechara A et al. (1994). Insensitivity to future consequences following damage to human prefrontal cortex. Cognition." },
                    { question: "La norme de réciprocité dans les interactions sociales est traitée neurologiquement par :", options: ["Le cervelet exclusivement", "Le réseau default mode en interaction avec les circuits de récompense", "Le cortex visuel secondaire", "Le tronc cérébral seul"], correct: 1, explanation: "La réciprocité sociale mobilise le réseau du mode par défaut (mPFC, TPJ, précunéus) pour la mentalisation, couplé aux circuits de récompense (striatum) qui signalent la valeur des échanges coopératifs ou non-coopératifs.", ref: "Fehr E & Camerer CF. (2007). Social neuroeconomics: the neural circuitry of social preferences. Trends Cogn Sci." },
                    { question: "Le phénomène d'amygdalectomie bilatérale chez l'humain (syndrome de Klüver-Bucy) entraîne :", options: ["Hyperpeur et hypervigilance", "Placidité, hypersexualité, hyperoralie et agnosie visuelle", "Amnésie antérograde sévère", "Apraxie idéomotrice"], correct: 1, explanation: "Le syndrome de Klüver-Bucy, observé après résection bilatérale des lobes temporaux incluant l'amygdale, se caractérise par une placidité émotionnelle, une hypersexualité, une hyperphagie et une tendance à explorer les objets oralement.", ref: "Klüver H & Bucy PC. (1939). Preliminary analysis of functions of the temporal lobes in monkeys. Arch Neurol Psychiatry." },
                    { question: "La régulation émotionnelle par suppression expressive (suppression) comparée à la réévaluation cognitive :", options: ["Suppression plus efficace et moins coûteuse cognitivement", "Suppression réduit l'expression mais maintient l'activation physiologique et nuit au bien-être", "Les deux stratégies sont identiques en termes d'efficacité", "La réévaluation augmente la détresse émotionnelle"], correct: 1, explanation: "La suppression expressive réduit le comportement expressif mais maintient ou amplifie l'activation physiologique (réactivité amygdalienne). La réévaluation cognitive réduit à la fois l'expérience subjective et la réactivité physiologique.", ref: "Gross JJ & John OP. (2003). Individual differences in two emotion regulation processes. J Pers Soc Psychol." },
                    { question: "Le réseau du mode par défaut (Default Mode Network) est particulièrement actif lors de :", options: ["Tâches attentionnelles exigeantes", "Repos, pensée auto-référentielle et mentalisation", "Traitements sensoriels primaires", "Mouvements volontaires précis"], correct: 1, explanation: "Le DMN (cortex préfrontal médian, cortex cingulaire postérieur, TPJ, précunéus) s'active au repos et lors de la pensée auto-référentielle, la projection dans le futur, le rappel autobiographique et la mentalisation sociale.", ref: "Buckner RL, Andrews-Hanna JR & Schacter DL. (2008). The brain's default network. Ann NY Acad Sci." },
                    { question: "La cognition sociale est déficitaire dans quelle pathologie caractérisée par une lésion frontale ventromédiane ?", options: ["Maladie de Parkinson", "Syndrome frontal ventromédian (lésions OFC/vmPFC)", "Sclérose en plaques", "Épilepsie temporale"], correct: 1, explanation: "Les lésions du cortex préfrontal ventromédian (OFC/vmPFC) provoquent des déficits sévères de cognition sociale : prise de décision irrationnelle, insensibilité aux normes sociales, indifférence émotionnelle, malgré un QI et des fonctions exécutives souvent préservés.", ref: "Anderson SW et al. (1999). Impairment of social and moral behavior related to early damage in human prefrontal cortex. Nat Neurosci." }
                ],
                troubles_mouvement: [
                    { question: "Quel noyau des ganglions de la base est le principal cible de la dopamine dans le circuit moteur ?", options: ["Noyau caudé et putamen (striatum)", "Globus pallidus externe", "Noyau sous-thalamique", "Substantia nigra pars reticulata"], correct: 0, explanation: "Le striatum (noyau caudé + putamen) reçoit les projections dopaminergiques de la substantia nigra pars compacta via la voie nigrostriatale. Sa dégénérescence dans la maladie de Parkinson entraîne les symptômes moteurs.", ref: "DeLong MR. (1990). Primate models of movement disorders of basal ganglia origin. Trends Neurosci." },
                    { question: "La triade classique de la maladie de Parkinson comprend :", options: ["Spasticité, hyperréflexie, clonus", "Tremblement de repos, rigidité, akinésie/bradykinésie", "Ataxie, dysarthrie, nystagmus", "Chorée, démence, troubles psychiatriques"], correct: 1, explanation: "La maladie de Parkinson se manifeste classiquement par un tremblement de repos (4-6 Hz), une rigidité en roue dentée, et une akinésie/bradykinésie. Ces signes résultent du déficit dopaminergique nigrostrié.", ref: "Kalia LV & Lang AE. (2015). Parkinson's disease. Lancet." },
                    { question: "Quelle protéine s'accumule anormalement dans les corps de Lewy de la maladie de Parkinson ?", options: ["Tau", "Bêta-amyloïde", "Alpha-synucléine", "TDP-43"], correct: 2, explanation: "L'alpha-synucléine mal repliée s'agrège pour former les corps de Lewy, inclusions intraneuronales pathognomoniques de la maladie de Parkinson et des démences à corps de Lewy.", ref: "Spillantini MG et al. (1997). Alpha-synuclein in Lewy bodies. Nature." },
                    { question: "La chorée de Huntington est causée par :", options: ["Une délétion sur le chromosome 7", "Une expansion de triplets CAG sur le gène HTT (chromosome 4)", "Une mutation ponctuelle du gène PINK1", "Une trisomie 21"], correct: 1, explanation: "La maladie de Huntington est due à une expansion pathologique de répétitions CAG (>36) dans le gène HTT codant la huntingtine. Elle se transmet sur le mode autosomique dominant avec pénétrance complète.", ref: "Ross CA & Tabrizi SJ. (2011). Huntington's disease: from molecular pathogenesis to clinical treatment. Lancet Neurol." },
                    { question: "La dystonie se définit comme :", options: ["Un tremblement rythmique involontaire au repos", "Des contractions musculaires soutenues provoquant des postures anormales", "Une perte de coordination cérébelleuse", "Une paralysie flasque progressive"], correct: 1, explanation: "La dystonie est un syndrome hyperkinétique caractérisé par des contractions musculaires involontaires, soutenues ou intermittentes, entraînant des mouvements répétitifs et des postures anormales.", ref: "Albanese A et al. (2013). Phenomenology and classification of dystonia. Mov Disord." },
                    { question: "Quel traitement est considéré comme le gold standard pour la maladie de Parkinson ?", options: ["Agonistes dopaminergiques seuls", "Lévodopa (L-DOPA)", "Anticholinergiques", "Inhibiteurs de la MAO-B seuls"], correct: 1, explanation: "La lévodopa, précurseur de la dopamine qui traverse la barrière hémato-encéphalique, reste le traitement le plus efficace de la maladie de Parkinson. Elle est associée à la carbidopa pour réduire les effets périphériques.", ref: "Poewe W et al. (2017). Parkinson disease. Nat Rev Dis Primers." },
                    { question: "La stimulation cérébrale profonde (SCP/DBS) dans la maladie de Parkinson cible principalement :", options: ["Le cortex moteur primaire", "Le noyau sous-thalamique (NST)", "L'hippocampe", "Le thalamus médiodorsal"], correct: 1, explanation: "La stimulation à haute fréquence du noyau sous-thalamique (NST) réduit l'hyperactivité de la voie indirecte des ganglions de la base et améliore significativement les symptômes moteurs parkinsoniens.", ref: "Limousin P et al. (1998). Electrical stimulation of the subthalamic nucleus in advanced Parkinson's disease. N Engl J Med." },
                    { question: "L'ataxie cérébelleuse se caractérise par :", options: ["Tremblement de repos et rigidité", "Incoordination des mouvements, dysmétrie et trouble de l'équilibre", "Mouvements choréiques involontaires", "Spasticité et hyperréflexie"], correct: 1, explanation: "L'ataxie cérébelleuse résulte d'une dysfonction cérébelleuse et se manifeste par une démarche ébrieuse, une dysmétrie (épreuve doigt-nez), une adiadococinésie et un tremblement intentionnel.", ref: "Manto M et al. (2012). Consensus paper: roles of the cerebellum in motor control. Cerebellum." },
                    { question: "Le tremblement essentiel se distingue du tremblement parkinsonien car il est :", options: ["Un tremblement de repos disparaissant à l'action", "Un tremblement d'action (postural/cinétique) sans tremblement de repos dominant", "Associé à une rigidité musculaire", "Toujours unilatéral"], correct: 1, explanation: "Le tremblement essentiel est un tremblement d'action (postural et cinétique), bilatéral, touchant les membres supérieurs et parfois la tête. Il disparaît au repos, à l'inverse du tremblement parkinsonien.", ref: "Louis ED. (2005). Essential tremor. Lancet Neurol." },
                    { question: "La voie directe des ganglions de la base a pour effet net de :", options: ["Inhiber le thalamus moteur", "Désinhiber le thalamus moteur (faciliter le mouvement)", "Activer le noyau sous-thalamique", "Inhiber le striatum"], correct: 1, explanation: "La voie directe (striatum → GPi/SNr) inhibe le globus pallidus interne, levant son inhibition tonique sur le thalamus moteur, ce qui facilite l'initiation du mouvement voulu.", ref: "Alexander GE & Crutcher MD. (1990). Functional architecture of basal ganglia circuits. Trends Neurosci." },
                    { question: "Quelle est la principale voie dégénérescente dans la maladie de Parkinson ?", options: ["Voie corticospinale", "Voie nigrostriatale (SN pars compacta → putamen)", "Voie cortico-cérébelleuse", "Voie thalamo-corticale"], correct: 1, explanation: "La maladie de Parkinson est caractérisée par la dégénérescence des neurones dopaminergiques de la substantia nigra pars compacta qui projettent vers le putamen via la voie nigrostriatale, réduisant la dopamine striatale de >80% au diagnostic clinique.", ref: "Fearnley JM & Lees AJ. (1991). Ageing and Parkinson's disease: substantia nigra regional selectivity. Brain." },
                    { question: "Le syndrome des jambes sans repos (SJSR) est associé à un dysfonctionnement de quel système ?", options: ["Système sérotoninergique exclusivement", "Système dopaminergique (voie spinale et mésolimbique)", "Système cholinergique central", "Système GABAergique cérébeleux"], correct: 1, explanation: "Le SJSR implique un dysfonctionnement dopaminergique des voies spinales et diencéphalospinales. La carence en fer (cofacteur de la tyrosine hydroxylase) aggrave la synthèse dopaminergique et contribue à la pathophysiologie.", ref: "Allen RP et al. (2003). Restless legs syndrome: diagnostic criteria, special considerations, and epidemiology. Sleep Med." },
                    { question: "La maladie de Wilson est un trouble du mouvement causé par :", options: ["Un déficit en dopamine", "Une accumulation de cuivre par mutation du gène ATP7B", "Une accumulation de fer dans les ganglions de la base", "Un excès de sérotonine"], correct: 1, explanation: "La maladie de Wilson est une maladie autosomique récessive du métabolisme du cuivre (mutation ATP7B) entraînant son accumulation dans le foie, le cerveau (ganglions de la base) et la cornée (anneau de Kayser-Fleischer), provoquant des troubles du mouvement et psychiatriques.", ref: "Lorincz MT. (2010). Neurologic Wilson's disease. Ann NY Acad Sci." },
                    { question: "Quelle est la caractéristique du tremblement dans l'ataxie cérébelleuse ?", options: ["Tremblement de repos disparaissant à l'action", "Tremblement intentionnel (cinétique) s'aggravant à l'approche de la cible", "Tremblement orthostatique à 16 Hz", "Tremblement postural pur sans composante cinétique"], correct: 1, explanation: "Le tremblement cérébelleux est un tremblement intentionnel (cinétique) qui s'accentue lors des mouvements orientés vers une cible (épreuve doigt-nez), reflétant le rôle du cervelet dans la correction en temps réel des trajectoires motrices.", ref: "Deuschl G et al. (1998). Consensus statement of the Movement Disorder Society on Tremor. Mov Disord." },
                    { question: "Les agonistes dopaminergiques (ex: pramipexole, ropinirole) dans la maladie de Parkinson peuvent provoquer comme effet secondaire notable :", options: ["Une amélioration définitive de la mémoire", "Des troubles du contrôle des impulsions (jeu pathologique, hypersexualité)", "Une réduction permanente des dyskinésies", "Une normalisation du sommeil paradoxal"], correct: 1, explanation: "Les agonistes dopaminergiques stimulent les récepteurs D3 du système mésolimbique, pouvant induire des troubles du contrôle des impulsions : jeu compulsif, hypersexualité, achats compulsifs — des effets sous-estimés mais significatifs.", ref: "Weintraub D et al. (2010). Impulse control disorders in Parkinson disease. Arch Neurol." },
                    { question: "La dysmétrie se définit comme :", options: ["Une paralysie des muscles oculomoteurs", "Une erreur dans la précision et l'amplitude des mouvements dirigés vers une cible", "Un tremblement de repos unilatéral", "Une rigidité en tuyau de plomb"], correct: 1, explanation: "La dysmétrie est un signe cérébelleux caractérisé par une incapacité à moduler précisément l'amplitude et la force des mouvements, conduisant à des erreurs de trajectoire (hypermétrie ou hypométrie) lors des mouvements volontaires.", ref: "Thach WT, Goodkin HP & Keating JG. (1992). The cerebellum and the adaptive coordination of movement. Annu Rev Neurosci." },
                    { question: "Le phénomène d'on-off dans la maladie de Parkinson traitée par L-DOPA correspond à :", options: ["L'alternance veille-sommeil pathologique", "Des fluctuations motrices avec périodes de bonne mobilité (on) et de blocage (off)", "L'activation/désactivation du stimulateur DBS", "Une fluctuation de la tension artérielle"], correct: 1, explanation: "Après plusieurs années de L-DOPA, les patients développent des fluctuations motrices imprévisibles : des phases 'on' (bonne mobilité, souvent avec dyskinésies) alternent avec des phases 'off' (retour des symptômes parkinsoniens), reflétant la perte de tamponnage dopaminergique striatale.", ref: "Obeso JA et al. (2000). Pathophysiology of levodopa-induced dyskinesias in Parkinson's disease. Trends Neurosci." },
                    { question: "La paralysie supranucléaire progressive (PSP) se distingue de la maladie de Parkinson par :", options: ["Un tremblement de repos prédominant", "Une paralysie du regard vertical vers le bas et des chutes précoces en arrière", "Une réponse excellente à la L-DOPA", "Une atteinte unilatérale exclusive"], correct: 1, explanation: "La PSP (tauopathie) est caractérisée par une paralysie du regard vertical (vers le bas surtout), des chutes précoces en rétropulsion, une rigidité axiale, une dysarthrie et une démence sous-corticale. Elle répond mal à la L-DOPA.", ref: "Litvan I et al. (1996). Clinical research criteria for the diagnosis of progressive supranuclear palsy. Neurology." },
                    { question: "Quelle structure des ganglions de la base est hyperactive dans la maladie de Parkinson, contribuant à l'akinésie ?", options: ["Striatum", "Globus pallidus interne (GPi) et substantia nigra pars reticulata", "Noyau accumbens", "Claustrum"], correct: 1, explanation: "La perte dopaminergique nigrostriatale déséquilibre les voies directe/indirecte, entraînant une hyperactivité du GPi et de la SNr. Ces structures inhibent excessivement le thalamus moteur et le tronc cérébral, produisant l'akinésie.", ref: "DeLong MR. (1990). Primate models of movement disorders of basal ganglia origin. Trends Neurosci." },
                    { question: "La rééducation de la marche par métronome ou stimulation rythmique auditive (RAS) dans la maladie de Parkinson est efficace car :", options: ["Elle augmente la dopamine striatale", "Elle fournit une horloge externe compensant le déficit du timing interne des ganglions de la base", "Elle renforce les neurones dopaminergiques", "Elle réduit la rigidité par étirement musculaire"], correct: 1, explanation: "La stimulation rythmique auditive fournit un signal temporel externe qui contourne le déficit de rythmicité interne des ganglions de la base, améliorant la longueur du pas, la vitesse de marche et réduisant le festination.", ref: "Thaut MH et al. (1996). Rhythmic auditory stimulation in gait training for Parkinson's disease patients. Mov Disord." }
                ],
                neurogenetique: [
                    { question: "Quel gène est le plus fréquemment muté dans la maladie d'Alzheimer à début tardif (forme sporadique) ?", options: ["APP", "PSEN1", "APOE ε4", "HTT"], correct: 2, explanation: "L'allèle APOE ε4 est le principal facteur de risque génétique de la maladie d'Alzheimer sporadique. Les porteurs homozygotes APOE ε4/ε4 ont un risque multiplié par 8-12 par rapport aux non-porteurs.", ref: "Corder EH et al. (1993). Gene dose of apolipoprotein E type 4 allele and the risk of Alzheimer's disease. Science." },
                    { question: "Les mutations du gène SNCA codant l'alpha-synucléine sont associées à :", options: ["Maladie de Huntington", "Sclérose latérale amyotrophique", "Maladie de Parkinson familiale", "Maladie de Creutzfeldt-Jakob"], correct: 2, explanation: "Des mutations (A53T, A30P, E46K) et des duplications/triplication du gène SNCA causent des formes familiales autosomiques dominantes de maladie de Parkinson, soulignant le rôle central de l'alpha-synucléine.", ref: "Polymeropoulos MH et al. (1997). Mutation in the alpha-synuclein gene identified in families with Parkinson's disease. Science." },
                    { question: "Quelle maladie neurologique est causée par une expansion de triplets CTG dans le gène DMPK ?", options: ["Maladie de Huntington", "Dystrophie myotonique de Steinert (type 1)", "Ataxie de Friedreich", "Syndrome de l'X fragile"], correct: 1, explanation: "La dystrophie myotonique de type 1 (Steinert) est causée par une expansion de répétitions CTG dans la région 3'UTR du gène DMPK. C'est la myopathie de l'adulte la plus fréquente, à transmission autosomique dominante.", ref: "Brook JD et al. (1992). Molecular basis of myotonic dystrophy: expansion of a trinucleotide repeat at the 3' end of a transcript encoding a protein kinase family member. Cell." },
                    { question: "Le syndrome de l'X fragile, première cause héréditaire de déficience intellectuelle, est dû à :", options: ["Une délétion du chromosome X", "Une expansion de triplets CGG dans le gène FMR1", "Une trisomie X", "Une mutation ponctuelle de MECP2"], correct: 1, explanation: "L'expansion de >200 répétitions CGG dans la région promotrice du gène FMR1 entraîne sa méthylation et silençage, abolissant la production de FMRP, protéine essentielle à la plasticité synaptique.", ref: "Verkerk AJ et al. (1991). Identification of a gene (FMR-1) containing a CGG repeat coincident with a breakpoint cluster region exhibiting length variation in fragile X syndrome. Cell." },
                    { question: "Les mutations du gène MECP2 (codant la protéine MeCP2) causent :", options: ["Syndrome de Rett", "Syndrome de Williams", "Phénylcétonurie", "Neurofibromatose de type 1"], correct: 0, explanation: "Les mutations de MECP2 (lié à l'X) causent le syndrome de Rett, un trouble neurodéveloppemental sévère touchant quasi exclusivement les filles, avec régression développementale, stéréotypies manuelles et épilepsie.", ref: "Amir RE et al. (1999). Rett syndrome is caused by mutations in X-linked MECP2, encoding methyl-CpG-binding protein 2. Nat Genet." },
                    { question: "L'épigénétique en neurosciences désigne :", options: ["Les mutations permanentes de l'ADN", "Des modifications héritables de l'expression génique sans altération de la séquence ADN", "La séquençage du génome neuronal", "La transcription des ARNm neuronaux"], correct: 1, explanation: "L'épigénétique englobe les méthylations de l'ADN, les modifications des histones et les ARN non-codants qui régulent l'expression génique dans les neurones, influencés par l'expérience et l'environnement.", ref: "Sweatt JD. (2013). The emerging field of neuroepigenetics. Neuron." },
                    { question: "Quelle mutation autosomique dominante cause la sclérose latérale amyotrophique (SLA) familiale dans ~20% des cas ?", options: ["Mutation de HTT", "Mutation de SOD1", "Mutation de APOE", "Mutation de PSEN1"], correct: 1, explanation: "Des mutations gain-de-fonction du gène SOD1 (superoxyde dismutase 1) causent ~20% des SLA familiales. Depuis, des mutations C9orf72 (expansion GGGGCC) ont été identifiées comme cause plus fréquente.", ref: "Rosen DR et al. (1993). Mutations in Cu/Zn superoxide dismutase gene are associated with familial amyotrophic lateral sclerosis. Nature." },
                    { question: "Le phénomène d'anticipation génétique dans les maladies à triplets répétés signifie :", options: ["La maladie apparaît plus tôt dans la vie", "L'expansion augmente à chaque génération, aggravant et avançant la maladie", "Les mutations disparaissent spontanément", "La sévérité diminue à chaque génération"], correct: 1, explanation: "L'anticipation génétique désigne le phénomène par lequel les répétitions de trinucléotides s'étendent lors des transmissions, entraînant une apparition plus précoce et une sévérité accrue à chaque génération.", ref: "McMurray CT. (2010). Mechanisms of trinucleotide repeat instability during human development. Nat Rev Genet." },
                    { question: "L'ataxie de Friedreich est causée par :", options: ["Une expansion GAA dans le gène FXN (frataxine)", "Une mutation de HTT", "Une expansion CAG dans ATXN1", "Une délétion de PTEN"], correct: 0, explanation: "L'ataxie de Friedreich, la plus fréquente des ataxies héréditaires, est causée par une expansion de répétitions GAA dans l'intron 1 du gène FXN, réduisant la production de frataxine et entraînant un stress oxydatif mitochondrial.", ref: "Campuzano V et al. (1996). Friedreich's ataxia: autosomal recessive disease caused by an intronic GAA triplet repeat expansion. Science." },
